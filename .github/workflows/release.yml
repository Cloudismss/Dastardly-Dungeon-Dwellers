name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'

jobs:
  Release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        shell: pwsh
        run: |
          $vcvars = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat"
          cmd /c "`"$vcvars`" x64 && set" | ForEach-Object {
            if ($_ -match "^([^=]+)=(.*)$") {
              echo "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV
            }
          }

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-cmake-deps-

      - name: Configure CMake
        run: cmake --preset windows-release

      - name: Build
        run: cmake --build build

      - name: Upload Release Asset
        run: gh release upload "${{ github.ref_name }}" "build/Dastardly Dungeon Dwellers.exe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest ttyd image
        run: docker pull tsl0922/ttyd:latest

      - name: Extract ttyd HTML
        run: |
          docker run --rm -d --name ttyd-patch -p 17681:17681 tsl0922/ttyd:latest ttyd --port 17681 /bin/sh
          sleep 2
          for i in $(seq 1 10); do
            curl -sf http://localhost:17681/ -o /tmp/ttyd_index.html && [ -s /tmp/ttyd_index.html ] && break
            rm -f /tmp/ttyd_index.html
            sleep 1
          done
          docker stop ttyd-patch
          [ -s /tmp/ttyd_index.html ] || { echo "ERROR: failed to extract ttyd index.html"; exit 1; }

      - name: Patch favicon
        run: |
          ICO_B64=$(base64 -w 0 res/DDD.ico)
          sed "s|<link rel=\"icon\" type=\"image/png\" href=\"data:image/png;base64,[^\"]*\"|<link rel=\"icon\" type=\"image/x-icon\" href=\"data:image/x-icon;base64,${ICO_B64}\"|" /tmp/ttyd_index.html > res/index.html

      - name: Inject CRT effects
        run: |
          python3 -c "
          content = open('res/index.html').read()
          inject  = open('res/crt-inject.html').read()
          open('res/index.html', 'w').write(content.replace('</body>', inject + '</body>', 1))
          "

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: images.cloudisms.dev
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            images.cloudisms.dev/dastardly-dungeon-dwellers:${{ github.ref_name }}
            images.cloudisms.dev/dastardly-dungeon-dwellers:latest
          cache-from: type=registry,ref=images.cloudisms.dev/dastardly-dungeon-dwellers:buildcache
          cache-to: type=registry,ref=images.cloudisms.dev/dastardly-dungeon-dwellers:buildcache,mode=max
