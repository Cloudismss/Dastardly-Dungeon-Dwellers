name: Build and Release

permissions:
  contents: write

on: 
  push:
    tags:
      - '*'

jobs:
  Release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        shell: pwsh
        run: |
          $vcvars = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat"
          cmd /c "`"$vcvars`" x64 && set" | ForEach-Object {
            if ($_ -match "^([^=]+)=(.*)$") {
              echo "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV
            }
          }

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-cmake-deps-

      - name: Configure CMake
        run: cmake --preset windows-release

      - name: Build
        run: cmake --build build

      - name: Create Release
        run: gh release create "${{ github.ref_name }}" "build/Dastardly Dungeon Dwellers.exe" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
