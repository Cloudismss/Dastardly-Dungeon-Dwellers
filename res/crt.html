<!-- ============================================================
     CRT visual effects — Amber Phosphor profile
     Inspired by cool-retro-term (github.com/Swordfish90/cool-retro-term)
     Auto-injected before </body> by the release workflow.
     ============================================================ -->

<!-- VT323 pixel font -->
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap">

<!-- SVG filter definitions.                                              -->
<!-- Must NOT be display:none — browsers refuse to resolve url(#id)       -->
<!-- references into a display:none element. Zero-size keeps it invisible. -->
<svg id="crt-filters-svg" aria-hidden="true" focusable="false"
     style="position:absolute;width:0;height:0;overflow:hidden">

  <filter id="crt-noise-filter" color-interpolation-filters="linearRGB"
          x="0%" y="0%" width="100%" height="100%">
    <feTurbulence id="crt-turbulence"
      type="fractalNoise" baseFrequency="0.75"
      numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>

  <!-- Bezel clip: full-viewport rect minus a rounded-rect hole (evenodd).  -->
  <!-- JS updates the path whenever frame size or radius changes.           -->
  <clipPath id="bezel-clip" clipPathUnits="userSpaceOnUse">
    <path id="bezel-clip-path" clip-rule="evenodd"/>
  </clipPath>

</svg>

<!-- Noise overlay -->
<svg id="crt-noise-svg" aria-hidden="true" focusable="false"
     style="position:absolute;inset:0;width:100%;height:100%;
            pointer-events:none;z-index:8999;mix-blend-mode:screen;
            will-change:opacity;">
  <rect width="100%" height="100%" filter="url(#crt-noise-filter)"/>
</svg>

<style id="crt-styles">

/* ── CSS variables ──────────────────────────────────────────────────── */
/* Initial "safe" defaults; script overrides these immediately based on CONFIG. */
:root {
  --crt-bg:           #000;
  --crt-glow:         transparent;
  --crt-glow-rgb:     0,0,0;
  --crt-filter:       none;
  --crt-scanlines:    0;
  --crt-flicker-amt:  0;
  --crt-jitter-px:    0;
  --crt-frame-px:     0;
  --crt-margin-px:    0;
  --crt-radius-px:    10px;
}

/* ── Base background ────────────────────────────────────────────────── */
/* xterm-viewport is the scrollable container behind the WebGL canvas.  */
/* Forcing its background here makes the phosphor ambient colour appear  */
/* immediately on paint, before window.term is available to set the      */
/* xterm theme — so the boot animation already shows the right colour.  */
html, body { 
  background: var(--crt-bg) !important;
  width: 100vw !important;
  height: 100vh !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
}
.xterm-viewport { background-color: var(--crt-bg) !important; }

/* ── Phosphor tint ──────────────────────────────────────────────────── */
.xterm { filter: var(--crt-filter) !important; }

/* ── Rounded bezel ──────────────────────────────────────────────────── */
#terminal-container {
  /* inset drives the margin: shrinks the container from all four viewport
     edges so the terminal content sits inside the bezel frame. */
  position: fixed !important;
  inset: var(--crt-margin-px) !important;
  width: auto !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
  box-sizing: border-box !important;
  display: block !important;
  border-radius: var(--crt-radius-px);
  overflow: hidden !important;
  box-shadow:
    inset 0 0 15px rgba(0,0,0,0.85),
    0 0 80px rgba(0,0,0,0.95);
  z-index: 1;
  isolation: isolate;
  will-change: transform;
  transform: translate(var(--crt-jitter-x, 0), var(--crt-jitter-y, 0));
}

/* ── Bloom ──────────────────────────────────────────────────────────── */
#crt-bloom {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 8998;
  mix-blend-mode: screen;
  opacity: 0;
  transition: opacity 0.2s;
  will-change: opacity;
}
#crt-bloom-canvas {
  position: absolute;
  inset: 0;
  /* blur(40px) spreads the thresholded text mask into wide, soft halos.   */
  /* No post-blur brightness step — that causes a ring artifact by         */
  /* amplifying the steep part of the Gaussian falloff more than the tail. */
  filter: blur(40px);
  will-change: transform, opacity;
}

/* ── Scanlines ──────────────────────────────────────────────────────── */
#crt-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 9000;
  border-radius: 10px;
  will-change: opacity;
}
#crt-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent                          0px,
    transparent                          2px,
    rgba(0,0,0,var(--crt-scanlines))     2px,
    rgba(0,0,0,var(--crt-scanlines))     4px
  );
}

/* ── Jitter ─────────────────────────────────────────────────────────── */
/* Jitter is driven by JS variables --crt-jitter-x/y to avoid interrupting the main animation stack. */

/* ── Bezel ──────────────────────────────────────────────────────────── */
/* Full-viewport solid fill, clipped by an evenodd SVG path that cuts a  */
/* rounded-rect hole for the terminal area. Outer corners are square      */
/* (viewport boundary); inner corners are rounded (the SVG path).        */
#crt-bezel {
  position: fixed !important;
  inset: 0 !important;
  background: #1a1a1a;
  pointer-events: none;
  z-index: 9100;
  clip-path: url(#bezel-clip);
}

/* ── Glow line ──────────────────────────────────────────────────────── */
@keyframes crt-glow-line {
  0%   { transform: translateY(-220px); }
  100% { transform: translateY(100vh);  }
}
#crt-glow-line {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 220px;
  pointer-events: none;
  z-index: 9001;
  mix-blend-mode: screen;
  background: linear-gradient(
    to bottom,
    rgba(var(--crt-glow-rgb), 0)     0%,
    rgba(var(--crt-glow-rgb), 0.02) 45%,
    rgba(var(--crt-glow-rgb), 0.06) 72%,
    rgba(var(--crt-glow-rgb), 0.12) 86%,
    rgba(var(--crt-glow-rgb), 0.25) 95%,
    rgba(var(--crt-glow-rgb), 0.06) 98%,
    rgba(var(--crt-glow-rgb), 0)   100%
  );
  animation: crt-glow-line 8s linear infinite;
  transition: opacity 0.2s;
  opacity: 0;
  will-change: transform, opacity;
}

/* ── Flicker ────────────────────────────────────────────────────────── */
/* --crt-flicker-amt drives all dip depths so the slider controls them   */
/* proportionally without rewriting keyframe values.                     */
@keyframes crt-flicker {
  0%,92%,100% { opacity: 1; }
  93%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.50); }
  94%  { opacity: 1; }
  95%  { opacity: calc(1 - var(--crt-flicker-amt)); }
  96%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.25); }
  97%  { opacity: 1; }
  98%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.75); }
  99%  { opacity: 1; }
}

/* ── Power-on sweep ─────────────────────────────────────────────────── */
@keyframes crt-poweron {
  0%   { clip-path: inset(49.6% 0 49.6% 0); filter: brightness(4);   }
  25%  { clip-path: inset(20%   0 20%   0); filter: brightness(3);   }
  65%  { clip-path: inset(0%    0 0%    0); filter: brightness(1.4); }
  100% { clip-path: inset(0%    0 0%    0); }
}
#terminal-container { animation: crt-flicker 10s steps(1) infinite; }
#terminal-container.crt-boot {
  animation:
    crt-poweron 0.7s cubic-bezier(.4,0,.2,1) forwards,
    crt-flicker 10s 0.7s steps(1) infinite;
}

/* ── Settings menu ──────────────────────────────────────────────────── */
#crt-menu {
  position: fixed;
  bottom: 10px;
  right: 12px;
  z-index: 9200;
  font-family: 'VT323', monospace;
  font-size: 15px;
  letter-spacing: 1px;
  user-select: none;
}
#crt-menu-btn {
  display: block;
  margin-left: auto;
  padding: 3px 9px;
  background: rgba(0,0,0,0.55);
  color: rgba(var(--crt-menu-rgb),0.80);
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  letter-spacing: inherit;
  transition: opacity 0.2s;
  opacity: 0.6;
}
#crt-menu-btn:hover { opacity: 1; }
#crt-menu-panel {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  min-width: 210px;
  background: rgba(0,0,0,0.90);
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  border-radius: 3px;
  padding: 8px 10px 10px;
}
#crt-menu-panel.open { display: block; }

.crt-menu-section {
  color: rgba(var(--crt-menu-rgb),0.45);
  font-size: 12px;
  letter-spacing: 2px;
  margin: 8px 0 4px;
  padding-bottom: 2px;
  border-bottom: 1px solid rgba(var(--crt-menu-rgb),0.15);
}
.crt-menu-section:first-child { margin-top: 0; }

/* Profile row */
.crt-menu-profile {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  color: rgba(var(--crt-menu-rgb),0.90);
  padding: 2px 0;
}
.crt-menu-profile button {
  background: none;
  border: none;
  color: rgba(var(--crt-menu-rgb),1);
  opacity: 0.6;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 0 2px;
  line-height: 1;
  transition: opacity 0.1s;
}
.crt-menu-profile button:hover { opacity: 1; }
#crt-profile-label { flex: 1; text-align: center; }

/* Effect rows */
.crt-effect-row { margin: 5px 0 2px; }
.crt-effect-header {
  display: flex;
  align-items: baseline;
  gap: 5px;
  color: rgba(var(--crt-menu-rgb),0.80);
}
.crt-effect-header.dim { color: rgba(var(--crt-menu-rgb),0.30); }
.crt-effect-label { flex: 1; }
.crt-effect-value { font-size: 13px; min-width: 26px; text-align: right; }
.crt-effect-toggle {
  background: none;
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  color: rgba(var(--crt-menu-rgb),0.70);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 0;
  padding: 0 4px;
  border-radius: 2px;
  line-height: 1.4;
}
.crt-effect-toggle:hover { color: rgba(var(--crt-menu-rgb),1); border-color: rgba(var(--crt-menu-rgb),0.60); }
.crt-effect-toggle.off   { color: rgba(var(--crt-menu-rgb),0.30); border-color: rgba(var(--crt-menu-rgb),0.15); }

/* Range slider */
.crt-slider {
  -webkit-appearance: none;
  appearance: none;
  display: block;
  width: 100%;
  height: 2px;
  background: rgba(var(--crt-menu-rgb),0.20);
  outline: none;
  border: none;
  cursor: pointer;
  margin: 3px 0 0;
  padding: 0;
}
.crt-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 8px;
  height: 14px;
  background: rgba(var(--crt-menu-rgb),0.85);
  border-radius: 1px;
  cursor: pointer;
}
.crt-slider::-moz-range-thumb {
  width: 8px;
  height: 14px;
  background: rgba(var(--crt-menu-rgb),0.85);
  border-radius: 1px;
  border: none;
  cursor: pointer;
}
.crt-slider:disabled {
  opacity: 0.25;
  cursor: default;
}

/* ── Custom profile checkbox ─────────────────────────────────────────── */
#crt-prof-section { display: flex; align-items: center; justify-content: space-between; }
#crt-custom-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 1px;
}
#crt-custom-cb { cursor: pointer; margin: 0; width: 11px; height: 11px; }

/* ── Custom color picker ─────────────────────────────────────────────── */
#crt-color-picker {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 5px 0 3px;
}
#crt-color-picker.visible { display: flex; }
#crt-hue-wheel { cursor: crosshair; display: block; }

</style>

<script id="crt-script">
/* Force preserveDrawingBuffer on WebGL contexts so the bloom canvas     */
/* can read back pixels. Must run before xterm.js initialises.           */
(function () {
  var _orig = HTMLCanvasElement.prototype.getContext;
  HTMLCanvasElement.prototype.getContext = function (type, attrs) {
    if (type === 'webgl' || type === 'webgl2')
      attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
    return _orig.call(this, type, attrs);
  };
}());

(function () {
  'use strict';

  /* ── Configuration — CENTRAL DEFAULTS ──────────────────────────────── */
  var CONFIG = {
    profileIdx: 0,   /* 0: GREEN, 1: AMBER, 2: BLUE, 3: WHITE */
    bloom:      50,  /* % */
    glowline:   40,  /* % */
    scanlines:  25,  /* % */
    noise:      15,  /* % */
    jitter:     15,  /* % */
    flicker:    10,  /* % */
    radius:     20,  /* % */
    framesize:  10,  /* % */
    contrast:   80,  /* % */
  };

  /* ── Colour helpers ────────────────────────────────────────────────── */
  function h2a(h) {
    var v = parseInt(h.replace('#', ''), 16);
    return [v >> 16 & 255, v >> 8 & 255, v & 255];
  }
  function a2h(r, g, b) {
    return '#' + [r, g, b].map(function (c) {
      return ('0' + Math.max(0, Math.min(255, Math.round(c))).toString(16)).slice(-2);
    }).join('');
  }

  /* ── Phosphor colour formula ───────────────────────────────────────── */
  /* Exact replication of cool-retro-term ApplicationSettings.qml:        */
  /*   saturatedColor = mix(rawFg, white, satColor × 0.5)                 */
  /*   fgRendered     = mix(rawBg, saturatedColor, 0.7 + contrast × 0.3)  */
  /*   bgRendered     = mix(saturatedColor, rawBg, 0.7 + contrast × 0.3)  */
  /* Both fg and bg vary with contrast — contrast shifts fg brightness     */
  /* AND adds a white-mix component (e.g. blue channel) from satColor.    */
  var contrastLevel = CONFIG.contrast / 100;

  function computePhosphorColors(rawFgHex, rawBgHex, satColor, contrast) {
    var f = h2a(rawFgHex), b = h2a(rawBgHex);
    var s = satColor * 0.5;
    var sc = [f[0]*(1-s) + 255*s, f[1]*(1-s) + 255*s, f[2]*(1-s) + 255*s];
    var mix = 0.7 + contrast * 0.3;
    return {
      fg: a2h(b[0]*(1-mix) + sc[0]*mix, b[1]*(1-mix) + sc[1]*mix, b[2]*(1-mix) + sc[2]*mix),
      bg: a2h(sc[0]*(1-mix) + b[0]*mix, sc[1]*(1-mix) + b[1]*mix, sc[2]*(1-mix) + b[2]*mix),
    };
  }

  /* ── Phosphor palette helper ───────────────────────────────────────── */
  /* Generates a monochrome 16-colour xterm theme tinted to a phosphor    */
  /* colour. Each ANSI slot maps to a lerp between bg (off) and fg (full) */
  /* at a brightness level chosen to preserve visual differentiation.     */
  function makePhosphorTheme(fgHex, bgHex) {
    var f = h2a(fgHex), bk = h2a(bgHex);
    function lerp(t) {
      return a2h(bk[0] + (f[0] - bk[0]) * t,
                 bk[1] + (f[1] - bk[1]) * t,
                 bk[2] + (f[2] - bk[2]) * t);
    }
    function boost(t) { return a2h(f[0] * t, f[1] * t, f[2] * t); }
    return {
      foreground: fgHex,  background: bgHex,
      cursor:     fgHex,  cursorAccent: bgHex,
      black:         bgHex,      red:           lerp(0.55),
      green:         lerp(0.65), yellow:        lerp(0.80),
      blue:          lerp(0.35), magenta:       lerp(0.60),
      cyan:          lerp(0.70), white:         lerp(0.85),
      brightBlack:   lerp(0.25), brightRed:     lerp(0.70),
      brightGreen:   lerp(0.80), brightYellow:  fgHex,
      brightBlue:    lerp(0.50), brightMagenta: lerp(0.80),
      brightCyan:    lerp(0.90), brightWhite:   boost(1.15),
    };
  }

  /* ── Phosphor profiles ─────────────────────────────────────────────── */
  /* rawFg/rawBg/satColor sourced from cool-retro-term ApplicationSettings.qml. */
  /* fg/bg are computed at runtime by computePhosphorColors so they track   */
  /* the contrast slider.                                                    */
  var profileIdx = CONFIG.profileIdx;
  var profiles = [
    { name: 'GREEN',      rawFg: '#1aff80', rawBg: '#000000', satColor: 0.0,
      glow: 'rgba(26,255,128,0.35)',   filter: 'brightness(1.05)',
      bloom: 'blur(40px)', menuRgb: '26, 255, 128' },
    { name: 'AMBER',     rawFg: '#ffb642', rawBg: '#000000', satColor: 0.2,
      glow: 'rgba(255,182,66,0.40)',  filter: 'brightness(1.05)',
      bloom: 'blur(40px)', menuRgb: '255, 182, 66' },
    { name: 'BLUE',      rawFg: '#7fb4ff', rawBg: '#000000', satColor: 0.2,
      glow: 'rgba(127,180,255,0.35)', filter: 'brightness(1.05)',
      bloom: 'blur(40px)', menuRgb: '127, 180, 255' },
    /* White: cool off-white phosphor with a faint cyan tint.               */
    { name: 'WHITE',     rawFg: '#c5ffff', rawBg: '#0f1414', satColor: 0.0,
      glow: 'rgba(197,255,255,0.25)', filter: 'brightness(1.00)',
      bloom: 'blur(40px)', menuRgb: '197, 255, 255' },
  ];

  /* ── Custom hue state ──────────────────────────────────────────────── */
  var customHue = 0;
  var customActive = false;
  var customProfile = {
    rawFg: '#ffffff', rawBg: '#000000', satColor: 0.0,
    glow: 'rgba(255,255,255,0.25)', filter: 'brightness(1.00)',
    bloom: 'blur(40px)', menuRgb: '255, 255, 255'
  };

  function hslToRgb(h, s, l) {
    s /= 100; l /= 100;
    var a = s * Math.min(l, 1 - l);
    function f(n) {
      var k = (n + h / 30) % 12;
      return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    }
    return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
  }

  /* ── VT323 font ────────────────────────────────────────────────────── */
  (function () {
    var p = profiles[profileIdx];
    var c = computePhosphorColors(p.rawFg || '#ffffff', p.rawBg, p.satColor || 0, contrastLevel);
    window.tty_options = Object.assign(window.tty_options || {}, {
      fontFamily: "'VT323', 'Courier New', monospace",
      fontSize:   18,
      theme:      makePhosphorTheme(c.fg, c.bg),
    });
  }());

  /* Inject a <style> block with hardcoded RGB values so there are no CSS   */
  /* variable references that browsers can stale-cache on profile changes.  */
  var menuThemeStyle = document.createElement('style');
  document.body.appendChild(menuThemeStyle);

  function updateMenuTheme(rgb) {
    menuThemeStyle.textContent =
      '#crt-menu-btn{color:rgba('+rgb+',0.80);border-color:rgba('+rgb+',0.30);}' +
      '#crt-menu-panel{border-color:rgba('+rgb+',0.30);}' +
      '.crt-menu-section{color:rgba('+rgb+',0.45);border-bottom-color:rgba('+rgb+',0.15);}' +
      '.crt-menu-profile{color:rgba('+rgb+',0.90);}' +
      '.crt-menu-profile button{color:rgba('+rgb+',1);}' +
      '.crt-effect-header{color:rgba('+rgb+',0.80);}' +
      '.crt-effect-header.dim{color:rgba('+rgb+',0.30);}' +
      '.crt-effect-toggle{border-color:rgba('+rgb+',0.30);color:rgba('+rgb+',0.70);}' +
      '.crt-effect-toggle:hover{color:rgba('+rgb+',1);border-color:rgba('+rgb+',0.60);}' +
      '.crt-effect-toggle.off{color:rgba('+rgb+',0.30);border-color:rgba('+rgb+',0.15);}' +
      '.crt-slider{background:rgba('+rgb+',0.20);}' +
      '.crt-slider::-webkit-slider-thumb{background:rgba('+rgb+',0.85);}' +
      '.crt-slider::-moz-range-thumb{background:rgba('+rgb+',0.85);}' +
      '#crt-custom-toggle{color:rgba('+rgb+',0.70);}';
  }
  /* Update xterm.js terminal colour theme at runtime via window.term.     */
  /* window.term is set asynchronously by ttyd after our script runs, so  */
  /* applyXtermTheme polls until it is available.                         */
  /* Optional cb is called once the theme is applied (used for boot anim) */
  function applyXtermTheme(theme, cb) {
    if (!theme) { if (cb) cb(); return; }
    if (window.term && window.term.options) {
      try { window.term.options.theme = theme; } catch (e) {}
      /* Double rAF: first rAF lets xterm schedule its redraw, second waits */
      /* for that redraw to actually land on the canvas before boot reveals  */
      /* the terminal content via the clip-path sweep.                       */
      if (cb) requestAnimationFrame(function () { requestAnimationFrame(cb); });
    } else {
      setTimeout(function () { applyXtermTheme(theme, cb); }, 50);
    }
  }

  /* Returns {fg, bg, theme} for a profile at the current contrastLevel.   */
  function computeColors(p) {
    if (!p.rawFg) return { fg: null, bg: p.rawBg, theme: p.xtermTheme || null };
    var c = computePhosphorColors(p.rawFg, p.rawBg, p.satColor, contrastLevel);
    return { fg: c.fg, bg: c.bg, theme: makePhosphorTheme(c.fg, c.bg) };
  }

  /* Apply initial profile immediately so JS state matches CSS defaults.   */
  (function () {
    var p = profiles[profileIdx];
    var c = computeColors(p);
    var s = document.documentElement.style;
    s.setProperty('--crt-bg',       c.bg);
    s.setProperty('--crt-glow',     p.glow);
    s.setProperty('--crt-glow-rgb', p.menuRgb);
    s.setProperty('--crt-filter',   p.filter);
    
    /* Ensure layout variables are available immediately for CSS calc(). */
    /* margin is derived from framesize — terminal insets to sit inside the bezel. */
    var framePx = (CONFIG.framesize / 100 * 120);
    s.setProperty('--crt-frame-px',  framePx.toFixed(0) + 'px');
    s.setProperty('--crt-margin-px', framePx.toFixed(0) + 'px');
    s.setProperty('--crt-radius-px', (CONFIG.radius / 100 * 80).toFixed(0) + 'px');

    document.body.style.background = c.bg;
    updateMenuTheme(p.menuRgb);
    applyXtermTheme(c.theme, function () {
      (document.getElementById('terminal-container') || document.body).classList.add('crt-boot');
      /* Trigger initial resize to fit new padded bounds. */
      window.dispatchEvent(new Event('resize'));
    });
  }());

  /* ── Static overlays ───────────────────────────────────────────────── */
  var overlay = document.createElement('div');
  overlay.id  = 'crt-overlay';

  var glowLine = document.createElement('div');
  glowLine.id  = 'crt-glow-line';

  /* Bezel lives on body (not inside terminal-container) because its      */
  /* clip-path covers the full viewport independent of terminal layout.   */
  var bezel = document.createElement('div');
  bezel.id  = 'crt-bezel';
  document.body.appendChild(bezel);

  /* ── Bezel clip-path ───────────────────────────────────────────────── */
  /* Recomputes the evenodd SVG path: outer viewport rect minus a rounded */
  /* inner rect that matches the terminal area. Called on resize and      */
  /* whenever frame size or radius changes.                               */
  var bezelClipPath = document.getElementById('bezel-clip-path');
  function updateBezelClip() {
    var s   = getComputedStyle(document.documentElement);
    var fpx = parseFloat(s.getPropertyValue('--crt-frame-px'))  || 0;
    var rpx = parseFloat(s.getPropertyValue('--crt-radius-px')) || 0;
    var W = window.innerWidth, H = window.innerHeight;
    var x = fpx, y = fpx, w = W - 2 * fpx, h = H - 2 * fpx;
    rpx = Math.min(rpx, w / 2, h / 2);
    /* Outer rect (CW) then inner rounded rect (CW) — evenodd makes hole. */
    var d =
      'M0,0 H' + W + ' V' + H + ' H0 Z' +
      ' M' + (x + rpx) + ',' + y +
      ' H' + (x + w - rpx) +
      ' Q' + (x + w) + ',' + y + ' ' + (x + w) + ',' + (y + rpx) +
      ' V' + (y + h - rpx) +
      ' Q' + (x + w) + ',' + (y + h) + ' ' + (x + w - rpx) + ',' + (y + h) +
      ' H' + (x + rpx) +
      ' Q' + x + ',' + (y + h) + ' ' + x + ',' + (y + h - rpx) +
      ' V' + (y + rpx) +
      ' Q' + x + ',' + y + ' ' + (x + rpx) + ',' + y + ' Z';
    bezelClipPath.setAttribute('d', d);
  }
  updateBezelClip();
  window.addEventListener('resize', updateBezelClip);

  /* Persistent observers to handle Preact's dynamic DOM swapping. */
  var ro = new ResizeObserver(function (entries) {
    for (var entry of entries) {
      /* Immediate resize. */
      window.dispatchEvent(new Event('resize'));
      /* Delayed resize to catch any ttyd settles. */
      setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 50);
      if (typeof resizeBloom === 'function') resizeBloom();
    }
  });

  function setupOverlays() {
    var tc = document.getElementById('terminal-container');
    if (!tc) return;

    /* Avoid duplicate appends if setupOverlays is called again. */
    if (tc.contains(overlay)) return;

    tc.appendChild(overlay);
    tc.appendChild(glowLine);

    var noise = document.getElementById('crt-noise-svg');
    if (noise) tc.appendChild(noise);

    var bloom = document.getElementById('crt-bloom');
    if (bloom) tc.appendChild(bloom);

    var termEl = tc.querySelector('.terminal');
    if (termEl) ro.observe(termEl);
  }

  /* Listen for any changes to <body> to re-attach overlays if Preact swaps them. */
  var bodyObserver = new MutationObserver(setupOverlays);
  bodyObserver.observe(document.body, { childList: true, subtree: true });
  
  /* Initial run. */
  setupOverlays();

  function applyProfile(p) {
    var c = computeColors(p);
    var s = document.documentElement.style;
    s.setProperty('--crt-bg',       c.bg);
    s.setProperty('--crt-glow',     p.glow);
    s.setProperty('--crt-glow-rgb', p.menuRgb);
    s.setProperty('--crt-filter',   p.filter);
    document.body.style.background = c.bg;
    var bc = document.getElementById('crt-bloom-canvas');
    if (bc) bc.style.filter = p.bloom;
    var lbl = document.getElementById('crt-profile-label');
    if (lbl) lbl.textContent = p.name;
    updateMenuTheme(p.menuRgb);
    applyXtermTheme(c.theme);
  }

  /* ── Effect definitions ────────────────────────────────────────────── */
  /* Each effect has:                                                      */
  /*   label    — display name                                             */
  /*   default  — initial slider value (0–100)                            */
  /*   apply(v) — called on every slider change with value 0–100          */
  /* ─────────────────────────────────────────────────────────────────── */
  var jitterStrength = CONFIG.jitter;

  var effectDefs = [
    {
      id: 'contrast', label: 'CONTRAST', default: CONFIG.contrast,
      /* Replicates cool-retro-term's contrast knob: shifts both fg and bg. */
      /* 100% = saturatedColor fg / black bg. 0% = ~30% of phosphor on bg.  */
      /* Only affects phosphor profiles that have a rawFg colour.           */
      apply: function (v) {
        contrastLevel = v / 100;
        var p = customActive ? customProfile : profiles[profileIdx];
        if (!p.rawFg) return;
        var c = computePhosphorColors(p.rawFg, p.rawBg, p.satColor, contrastLevel);
        document.documentElement.style.setProperty('--crt-bg', c.bg);
        document.body.style.background = c.bg;
        if (window.term && window.term.options) {
          try { window.term.options.theme = makePhosphorTheme(c.fg, c.bg); } catch (e) {}
        }
      },
    },
    {
      id: 'bloom', label: 'BLOOM', default: CONFIG.bloom,
      /* Map 0–100% directly to 0–1.0 opacity. blur(20px)+brightness(2)   */
      /* on the canvas already limits overshoot; screen blend on a dark    */
      /* background saturates gracefully so opacity 1.0 is safe.          */
      apply: function (v) {
        var el = document.getElementById('crt-bloom');
        if (el) el.style.opacity = (v / 100).toFixed(3);
      },
    },
    {
      id: 'glowline', label: 'GLOW LINE', default: CONFIG.glowline,
      apply: function (v) {
        var el = document.getElementById('crt-glow-line');
        if (el) el.style.opacity = (v / 100).toFixed(2);
      },
    },
    {
      id: 'scanlines', label: 'SCANLINES', default: CONFIG.scanlines,
      /* 26% → 0.13 (current default). Max 100% → 0.50.                 */
      apply: function (v) {
        document.documentElement.style.setProperty(
          '--crt-scanlines', (v / 100 * 0.5).toFixed(3));
      },
    },
    {
      id: 'noise', label: 'FILM GRAIN', default: CONFIG.noise,
      /* 15% → opacity 0.08 (≈ noise at reference strength).             */
      apply: function (v) {
        var el = document.getElementById('crt-noise-svg');
        if (el) {
          el.style.opacity = (v / 100 * 0.53).toFixed(3);
          el.style.display = v === 0 ? 'none' : 'block';
        }
      },
    },
    {
      id: 'jitter', label: 'JITTER', default: CONFIG.jitter,
      /* Controls both interval frequency and pixel displacement.         */
      apply: function (v) {
        jitterStrength = v;
        if (v === 0) {
          var s = document.documentElement.style;
          s.setProperty('--crt-jitter-x', '0px');
          s.setProperty('--crt-jitter-y', '0px');
        }
      },
    },
    {
      id: 'flicker', label: 'FLICKERING', default: CONFIG.flicker,
      /* --crt-flicker-amt is used directly in the keyframe calc().       */
      /* 10% → 0.08 amt. Max 100% → 0.80 amt (very deep dips).           */
      apply: function (v) {
        var tc = document.getElementById('terminal-container');
        if (v === 0) {
          if (tc) tc.style.animationPlayState = 'paused';
          document.documentElement.style.setProperty('--crt-flicker-amt', '0');
        } else {
          if (tc) tc.style.animationPlayState = 'running';
          document.documentElement.style.setProperty(
            '--crt-flicker-amt', (v / 100 * 0.8).toFixed(3));
        }
      },
    },
    {
      id: 'framesize', label: 'FRAME SIZE', default: CONFIG.framesize,
      /* 10% → 12px border. 100% → 120px. 0% → 0px.                      */
      /* margin tracks framesize so the terminal always sits inside the bezel. */
      apply: function (v) {
        var px = (v / 100 * 120).toFixed(0) + 'px';
        document.documentElement.style.setProperty('--crt-frame-px',  px);
        document.documentElement.style.setProperty('--crt-margin-px', px);
        updateBezelClip();
        window.dispatchEvent(new Event('resize'));
      },
    },
    {
      id: 'radius', label: 'ROUNDED FRAME', default: CONFIG.radius,
      toggleOnly: true,
      apply: function (v) {
        document.documentElement.style.setProperty(
          '--crt-radius-px', (v / 100 * 80).toFixed(0) + 'px');
        updateBezelClip();
      },
    },
  ];

  /* ── Settings menu ─────────────────────────────────────────────────── */
  var menu  = document.createElement('div');
  menu.id   = 'crt-menu';
  var panel = document.createElement('div');
  panel.id  = 'crt-menu-panel';

  /* Profile section */
  var profSection = document.createElement('div');
  profSection.id = 'crt-prof-section';
  profSection.className = 'crt-menu-section';

  var profTitle = document.createElement('span');
  profTitle.textContent = 'PROFILE';
  profSection.appendChild(profTitle);

  var customToggle = document.createElement('label');
  customToggle.id = 'crt-custom-toggle';
  var customCb = document.createElement('input');
  customCb.type = 'checkbox';
  customCb.id = 'crt-custom-cb';
  var customLbl = document.createElement('span');
  customLbl.textContent = 'CUSTOM';
  customToggle.appendChild(customCb);
  customToggle.appendChild(customLbl);
  profSection.appendChild(customToggle);

  panel.appendChild(profSection);

  var profRow = document.createElement('div');
  profRow.className = 'crt-menu-profile';
  var prevBtn = document.createElement('button');
  prevBtn.textContent = '◄';
  prevBtn.addEventListener('click', function () {
    profileIdx = (profileIdx - 1 + profiles.length) % profiles.length;
    applyProfile(profiles[profileIdx]);
  });

  var profLabel = document.createElement('span');
  profLabel.id = 'crt-profile-label';
  profLabel.textContent = profiles[profileIdx].name;

  var nextBtn = document.createElement('button');
  nextBtn.textContent = '►';
  nextBtn.addEventListener('click', function () {
    profileIdx = (profileIdx + 1) % profiles.length;
    applyProfile(profiles[profileIdx]);
  });
  profRow.appendChild(prevBtn);
  profRow.appendChild(profLabel);
  profRow.appendChild(nextBtn);

  /* Custom hue wheel — shown when the CUSTOM checkbox is checked */
  var pickerDiv = document.createElement('div');
  pickerDiv.id = 'crt-color-picker';

  var WHEEL_SIZE = 110, OUTER_R = 50, INNER_R = 32;
  var wheelCanvas = document.createElement('canvas');
  wheelCanvas.id     = 'crt-hue-wheel';
  wheelCanvas.width  = WHEEL_SIZE;
  wheelCanvas.height = WHEEL_SIZE;
  var wctx = wheelCanvas.getContext('2d');

  function drawHueWheel(hue) {
    wctx.clearRect(0, 0, WHEEL_SIZE, WHEEL_SIZE);
    var cx = WHEEL_SIZE / 2, cy = WHEEL_SIZE / 2;
    for (var i = 0; i < 360; i++) {
      var a0 = (i / 360) * Math.PI * 2 - Math.PI / 2;
      var a1 = ((i + 1) / 360) * Math.PI * 2 - Math.PI / 2;
      wctx.beginPath();
      wctx.moveTo(cx + Math.cos(a0) * INNER_R, cy + Math.sin(a0) * INNER_R);
      wctx.arc(cx, cy, OUTER_R, a0, a1);
      wctx.arc(cx, cy, INNER_R, a1, a0, true);
      wctx.closePath();
      wctx.fillStyle = 'hsl(' + i + ',100%,55%)';
      wctx.fill();
    }
    /* Selection dot */
    var selAngle = (hue / 360) * Math.PI * 2 - Math.PI / 2;
    var midR = (OUTER_R + INNER_R) / 2;
    var dx = Math.cos(selAngle) * midR, dy = Math.sin(selAngle) * midR;
    wctx.beginPath();
    wctx.arc(cx + dx, cy + dy, 5, 0, Math.PI * 2);
    wctx.fillStyle = '#fff';
    wctx.fill();
    wctx.strokeStyle = 'rgba(0,0,0,0.6)';
    wctx.lineWidth = 1.5;
    wctx.stroke();
  }

  function getHueFromEvent(e) {
    var rect = wheelCanvas.getBoundingClientRect();
    var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var angle = Math.atan2(clientY - cy, clientX - cx) + Math.PI / 2;
    return ((angle / (Math.PI * 2)) * 360 + 360) % 360;
  }

  function applyCustomHue(hue) {
    customHue = hue;
    var rgb = hslToRgb(hue, 100, 60);
    var hex = a2h(rgb[0], rgb[1], rgb[2]);
    var menuRgb = rgb[0] + ', ' + rgb[1] + ', ' + rgb[2];
    customProfile.rawFg   = hex;
    customProfile.glow    = 'rgba(' + rgb.join(',') + ',0.35)';
    customProfile.menuRgb = menuRgb;
    applyProfile(customProfile);
    drawHueWheel(hue);
  }

  drawHueWheel(customHue);

  var wheelDragging = false;
  wheelCanvas.addEventListener('mousedown', function (e) {
    wheelDragging = true;
    applyCustomHue(getHueFromEvent(e));
  });
  document.addEventListener('mousemove', function (e) {
    if (wheelDragging) applyCustomHue(getHueFromEvent(e));
  });
  document.addEventListener('mouseup', function () { wheelDragging = false; });
  wheelCanvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    applyCustomHue(getHueFromEvent(e));
  }, { passive: false });
  wheelCanvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    applyCustomHue(getHueFromEvent(e));
  }, { passive: false });

  pickerDiv.appendChild(wheelCanvas);

  /* Insert picker between section header and arrows, then append arrows */
  panel.appendChild(pickerDiv);
  panel.appendChild(profRow);

  customCb.addEventListener('change', function () {
    customActive = customCb.checked;
    var picker = document.getElementById('crt-color-picker');
    if (customActive) {
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      prevBtn.style.opacity = '0.20';
      nextBtn.style.opacity = '0.20';
      applyProfile(customProfile);
      if (picker) picker.classList.add('visible');
    } else {
      prevBtn.disabled = false;
      nextBtn.disabled = false;
      prevBtn.style.opacity = '';
      nextBtn.style.opacity = '';
      applyProfile(profiles[profileIdx]);
      if (picker) picker.classList.remove('visible');
    }
  });

  /* Effects section */
  var fxSection = document.createElement('div');
  fxSection.className = 'crt-menu-section';
  fxSection.textContent = 'EFFECTS';
  panel.appendChild(fxSection);

  var effectControls = {};
  var frameSizeRadiusWasOn = true;

  effectDefs.forEach(function (def) {
    var enabled    = true;
    var savedValue = def.default;

    var row = document.createElement('div');
    row.className = 'crt-effect-row';

    var header = document.createElement('div');
    header.className = 'crt-effect-header';

    var lbl = document.createElement('span');
    lbl.className   = 'crt-effect-label';
    lbl.textContent = def.label;

    var toggleBtn = document.createElement('button');
    toggleBtn.className   = 'crt-effect-toggle';
    toggleBtn.textContent = 'ON';

    header.appendChild(lbl);

    var valDisplay = document.createElement('span');
    valDisplay.className   = 'crt-effect-value';
    valDisplay.textContent = def.toggleOnly ? '' : def.default + '%';
    header.appendChild(valDisplay);

    header.appendChild(toggleBtn);

    var slider = !def.toggleOnly && (function () {
      var s = document.createElement('input');
      s.type      = 'range';
      s.className = 'crt-slider';
      s.min       = '0';
      s.max       = '100';
      s.value     = String(def.default);
      s.addEventListener('input', function () {
        var v = parseInt(this.value, 10);
        valDisplay.textContent = v + '%';
        def.apply(v);
      });
      return s;
    }());

    toggleBtn.addEventListener('click', function () {
      enabled = !enabled;
      if (enabled) {
        if (slider) { slider.disabled = false; slider.value = String(savedValue); valDisplay.textContent = savedValue + '%'; }
        header.className      = 'crt-effect-header';
        toggleBtn.textContent = 'ON';
        toggleBtn.className   = 'crt-effect-toggle';
        def.apply(savedValue);
      } else {
        savedValue = slider ? parseInt(slider.value, 10) : savedValue;
        if (slider) slider.disabled = true;
        header.className      = 'crt-effect-header dim';
        toggleBtn.textContent = 'OFF';
        toggleBtn.className   = 'crt-effect-toggle off';
        def.apply(0);
      }
      if (def.id === 'framesize' && effectControls.radius) {
        if (!enabled) {
          frameSizeRadiusWasOn = effectControls.radius.isOn();
          effectControls.radius.turnOff();
        } else if (frameSizeRadiusWasOn) {
          effectControls.radius.turnOn();
        }
      }
    });

    effectControls[def.id] = {
      isOn:    function () { return enabled; },
      turnOn:  function () { if (!enabled) toggleBtn.click(); },
      turnOff: function () { if (enabled)  toggleBtn.click(); },
    };

    /* Apply initial value */
    def.apply(def.default);

    row.appendChild(header);
    if (slider) row.appendChild(slider);
    panel.appendChild(row);
  });

  /* Toggle button */
  var menuBtn = document.createElement('button');
  menuBtn.id = 'crt-menu-btn';
  menuBtn.textContent = '[ CRT ]';
  menuBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    panel.classList.toggle('open');
  });
  document.addEventListener('click', function () {
    panel.classList.remove('open');
  });
  panel.addEventListener('click', function (e) { e.stopPropagation(); });

  menu.appendChild(panel);
  menu.appendChild(menuBtn);
  document.body.appendChild(menu);

  /* ── Animated film-grain noise ─────────────────────────────────────── */
  var turbulence = document.getElementById('crt-turbulence');
  var noiseSeed  = 0;
  (function tickNoise() {
    noiseSeed = (noiseSeed + 1) & 0x3FF;
    turbulence.setAttribute('seed', noiseSeed);
    setTimeout(function () { requestAnimationFrame(tickNoise); }, 80);
  }());

  /* ── Horizontal jitter ─────────────────────────────────────────────── */
  /* Interval scales with strength: 0% = never, 100% = very frequent.    */
  function scheduleJitter() {
    var gap = jitterStrength === 0
      ? 60000
      : Math.max(300, (100 - jitterStrength) * 150)
        + Math.random() * Math.max(300, (100 - jitterStrength) * 100);
    setTimeout(function () {
      if (jitterStrength > 0) {
        var tc = document.getElementById('terminal-container');
        if (tc) {
          var frames = 5;
          var count  = 0;
          var amp    = jitterStrength / 100 * 5;
          var iv = setInterval(function () {
            var dx = (Math.random() - 0.5) * amp;
            var dy = (Math.random() - 0.5) * amp;
            tc.style.setProperty('--crt-jitter-x', dx.toFixed(2) + 'px');
            tc.style.setProperty('--crt-jitter-y', dy.toFixed(2) + 'px');
            if (++count >= frames) {
              clearInterval(iv);
              tc.style.setProperty('--crt-jitter-x', '0px');
              tc.style.setProperty('--crt-jitter-y', '0px');
            }
          }, 30);
        }
      }
      scheduleJitter();
    }, gap);
  }
  scheduleJitter();

  /* ── Bloom ─────────────────────────────────────────────────────────── */
  var bloomCanvas, bloomCtx, tmp, tmpCtx, extract, extractCtx;
  var SCALE = 0.50;

  function resizeBloom() {
    var screen = document.querySelector('.xterm-screen');
    if (!screen || !bloomCanvas) return;
    var w = Math.max(1, Math.round(screen.offsetWidth  * SCALE));
    var h = Math.max(1, Math.round(screen.offsetHeight * SCALE));
    tmp.width  = extract.width  = bloomCanvas.width  = w;
    tmp.height = extract.height = bloomCanvas.height = h;
    var r = screen.getBoundingClientRect();
    var tc = document.getElementById('terminal-container');
    var tr = tc ? tc.getBoundingClientRect() : { left: 0, top: 0 };
    bloomCanvas.style.left   = (r.left - tr.left) + 'px';
    bloomCanvas.style.top    = (r.top  - tr.top)  + 'px';
    bloomCanvas.style.width  = r.width  + 'px';
    bloomCanvas.style.height = r.height + 'px';
  }

  function setupBloom() {
    if (document.getElementById('crt-bloom')) return;

    var bloomWrap = document.createElement('div');
    bloomWrap.id = 'crt-bloom';
    bloomWrap.style.opacity = (CONFIG.bloom / 100).toFixed(3);
    bloomCanvas = document.createElement('canvas');
    bloomCanvas.id = 'crt-bloom-canvas';
    bloomWrap.appendChild(bloomCanvas);
    
    var tc = document.getElementById('terminal-container');
    if (tc) tc.appendChild(bloomWrap);
    else document.body.appendChild(bloomWrap);

    bloomCtx = bloomCanvas.getContext('2d');

    tmp = document.createElement('canvas');
    tmpCtx = tmp.getContext('2d');
    extract = document.createElement('canvas');
    extractCtx = extract.getContext('2d');

    window.addEventListener('resize', resizeBloom);
    /* ResizeBloom will be called by the global ResizeObserver in setupOverlays. */
  }

  function tickBloom(ts) {
    requestAnimationFrame(tickBloom);
    var screen = document.querySelector('.xterm-screen');
    if (!screen || !bloomCtx) return;
    
    /* Recalculate position every frame to prevent detachment during moves. */
    var r = screen.getBoundingClientRect();
    var tc = document.getElementById('terminal-container');
    var tr = tc ? tc.getBoundingClientRect() : { left: 0, top: 0 };

    if (r.width > 0 && r.height > 0) {
      bloomCanvas.style.left   = (r.left - tr.left) + 'px';
      bloomCanvas.style.top    = (r.top  - tr.top)  + 'px';
      bloomCanvas.style.width  = r.width  + 'px';
      bloomCanvas.style.height = r.height + 'px';
      
      var w = Math.max(1, Math.round(r.width  * SCALE));
      var h = Math.max(1, Math.round(r.height * SCALE));
      if (bloomCanvas.width !== w || bloomCanvas.height !== h) {
        tmp.width  = extract.width  = bloomCanvas.width  = w;
        tmp.height = extract.height = bloomCanvas.height = h;
      }
    }

    var w = tmp.width, h = tmp.height;
    if (!w || !h) return;

    /* Pass 1 — composite all xterm canvas layers at half resolution.    */
    tmpCtx.clearRect(0, 0, w, h);
    screen.querySelectorAll('canvas').forEach(function (c) {
      if (c === bloomCanvas) return;
      try { tmpCtx.drawImage(c, 0, 0, w, h); } catch (e) {}
    });

    /* Adaptive brightness: target the background intensity to land     */
    /* safely below the contrast threshold (0.5). This ensures the      */
    /* background is crushed to absolute black regardless of the        */
    /* contrast slider setting, keeping the bloom mask stable.          */
    var _p = customActive ? customProfile : profiles[profileIdx];
    var _bg = _p.rawFg
      ? computePhosphorColors(_p.rawFg, _p.rawBg, _p.satColor, contrastLevel).bg
      : _p.rawBg;
    var _bgc = h2a(_bg);
    var _bgMax = Math.max(_bgc[0], _bgc[1], _bgc[2]);
    var _brt = _bgMax > 8 ? (120 / _bgMax) : 15;

    /* Pass 2 — minimal blur to smooth glyphs without killing intensity. */
    extractCtx.clearRect(0, 0, w, h);
    extractCtx.filter = 'blur(1px)';
    extractCtx.drawImage(tmp, 0, 0);
    extractCtx.filter = 'none';

    /* Pass 3 — threshold and colorize. */
    bloomCtx.globalCompositeOperation = 'source-over';
    bloomCtx.clearRect(0, 0, w, h);
    bloomCtx.fillStyle = '#000';
    bloomCtx.fillRect(0, 0, w, h);
    bloomCtx.filter = 'grayscale(1) brightness(' + _brt.toFixed(2) + ') contrast(12)';
    bloomCtx.drawImage(extract, 0, 0);
    bloomCtx.filter = 'none';

    bloomCtx.globalCompositeOperation = 'multiply';
    bloomCtx.fillStyle = 'rgb(' + _p.menuRgb + ')';
    bloomCtx.fillRect(0, 0, w, h);
    bloomCtx.globalCompositeOperation = 'source-over';
  }
  
  setupBloom();
  requestAnimationFrame(tickBloom);

  /* Power-on sweep is triggered by applyXtermTheme's callback above,     */
  /* so the animation plays only after the phosphor theme is applied.     */

}());
</script>
