<!-- ============================================================
     CRT visual effects — Amber Phosphor profile
     Inspired by cool-retro-term (github.com/Swordfish90/cool-retro-term)
     Auto-injected before </body> by the release workflow.
     ============================================================ -->

<!-- VT323 pixel font -->
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap">

<!-- SVG filter definitions.                                              -->
<!-- Must NOT be display:none — browsers refuse to resolve url(#id)       -->
<!-- references into a display:none element. Zero-size keeps it invisible. -->
<svg id="crt-filters-svg" aria-hidden="true" focusable="false"
     style="position:absolute;width:0;height:0;overflow:hidden">

  <!-- Film-grain noise (seed animated by JS) -->
  <filter id="crt-noise-filter" color-interpolation-filters="linearRGB"
          x="0%" y="0%" width="100%" height="100%">
    <feTurbulence id="crt-turbulence"
      type="fractalNoise" baseFrequency="0.75"
      numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>

</svg>

<!-- Noise overlay -->
<svg id="crt-noise-svg" aria-hidden="true" focusable="false"
     style="position:fixed;inset:0;width:100%;height:100%;
            pointer-events:none;z-index:8999;opacity:0.08;mix-blend-mode:screen;">
  <rect width="100%" height="100%" filter="url(#crt-noise-filter)"/>
</svg>

<style id="crt-styles">

/* ── CSS variables (mutated by the profile switcher) ────────────────── */
:root {
  --crt-bg:        #0d0800;
  --crt-glow:      rgba(255, 152, 0, 0.40);
  --crt-filter:    sepia(1) saturate(5) hue-rotate(5deg) brightness(1.15) contrast(1.08);
  --crt-scanlines: 0.13;
}

/* ── Base background ────────────────────────────────────────────────── */
html, body { background: var(--crt-bg) !important; }

/* ── Phosphor tint ──────────────────────────────────────────────────── */
.xterm {
  filter: var(--crt-filter) !important;
}

/* ── Rounded bezel ──────────────────────────────────────────────────── */
#terminal-container {
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0, 0, 0, 0.95);
}

/* ── Bloom ──────────────────────────────────────────────────────────── */
/* Wrapper holds mix-blend-mode; inner canvas holds the tint filter.     */
/* They must be on separate elements: filter creates an isolated          */
/* stacking context that breaks mix-blend-mode if on the same element.   */
#crt-bloom {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 8998;
  mix-blend-mode: screen;
  opacity: 0.5;
}
#crt-bloom-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  filter: sepia(1) saturate(5) hue-rotate(5deg);
}

/* ── Scanline + vignette overlay ────────────────────────────────────── */
#crt-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9000;
  border-radius: 10px;
}
#crt-overlay::before {   /* scanlines */
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent                          0px,
    transparent                          2px,
    rgba(0,0,0,var(--crt-scanlines))     2px,
    rgba(0,0,0,var(--crt-scanlines))     4px
  );
}


/* ── Profile switcher button ────────────────────────────────────────── */
#crt-profile-btn {
  position: fixed;
  bottom: 10px;
  right: 12px;
  z-index: 9100;
  font-family: 'VT323', monospace;
  font-size: 15px;
  letter-spacing: 1px;
  padding: 3px 9px;
  background: rgba(0, 0, 0, 0.55);
  color: rgba(255, 165, 0, 0.80);
  border: 1px solid rgba(255, 165, 0, 0.30);
  border-radius: 3px;
  cursor: pointer;
  user-select: none;
  transition: opacity 0.2s;
  opacity: 0.6;
}
#crt-profile-btn:hover { opacity: 1; }

/* ── Horizontal jitter ───────────────────────────────────────────────── */
@keyframes crt-jitter {
  0%,100% { transform: translateX(0);    }
  15%     { transform: translateX(-1px); }
  30%     { transform: translateX( 1px); }
  45%     { transform: translateX(-1px); }
  60%     { transform: translateX( 1px); }
  75%     { transform: translateX(0);    }
}
#terminal-container.crt-jitter {
  animation: crt-jitter 0.12s linear;
}

/* ── Glow line ──────────────────────────────────────────────────────── */
/* Simulates the faint bright band left by the CRT electron beam as it   */
/* sweeps from top to bottom. Loops continuously.                        */
@keyframes crt-glow-line {
  0%   { transform: translateY(-220px); }
  100% { transform: translateY(100vh); }
}
#crt-glow-line {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 220px;
  pointer-events: none;
  z-index: 9001;
  mix-blend-mode: screen;
  /* Gradient runs top→bottom. The element sweeps downward so the        */
  /* bottom edge is the leading beam; the trail fades upward behind it.  */
  background: linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0)      0%,   /* tail end — fully faded     */
    rgba(255, 255, 255, 0.01)  45%,   /* mid trail                  */
    rgba(255, 255, 255, 0.03)  72%,   /* approaching the beam       */
    rgba(255, 255, 255, 0.06)  86%,   /* beam shoulder              */
    rgba(255, 255, 255, 0.10)  95%,   /* peak brightness            */
    rgba(255, 255, 255, 0.03)  98%,   /* leading-edge falloff       */
    rgba(255, 255, 255, 0)    100%    /* hard bottom edge gone      */
  );
  animation: crt-glow-line 8s linear infinite;
}

/* ── Screen flicker ─────────────────────────────────────────────────── */
@keyframes crt-flicker {
  0%,92%,100% { opacity: 1;    }
  93%         { opacity: 0.96; }
  94%         { opacity: 1;    }
  95%         { opacity: 0.92; }
  96%         { opacity: 0.98; }
  97%         { opacity: 1;    }
  98%         { opacity: 0.94; }
  99%         { opacity: 1;    }
}

/* ── Power-on horizontal sweep ──────────────────────────────────────── */
@keyframes crt-poweron {
  0%   { clip-path: inset(49.6% 0 49.6% 0); filter: brightness(4);   }
  25%  { clip-path: inset(20%   0 20%   0); filter: brightness(3);   }
  65%  { clip-path: inset(0%    0 0%    0); filter: brightness(1.4); }
  100% { clip-path: inset(0%    0 0%    0); }
}
body { animation: crt-flicker 10s steps(1) infinite; }
body.crt-boot {
  animation:
    crt-poweron 0.7s cubic-bezier(.4,0,.2,1) forwards,
    crt-flicker 10s 0.7s steps(1) infinite;
}

</style>

<script id="crt-script">
/* Patch WebGL context creation so bloom can read back pixels.            */
/* Must run before xterm.js creates its renderer — inline scripts execute */
/* synchronously as the parser reaches them, before DOMContentLoaded.     */
(function () {
  var _orig = HTMLCanvasElement.prototype.getContext;
  HTMLCanvasElement.prototype.getContext = function (type, attrs) {
    if (type === 'webgl' || type === 'webgl2') {
      attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
    }
    return _orig.call(this, type, attrs);
  };
}());

(function () {
  'use strict';

  /* ── VT323 font ────────────────────────────────────────────────────── */
  /* ttyd merges window.tty_options into the xterm.js Terminal constructor  */
  /* at DOMContentLoaded; setting it here (inline, before that event)       */
  /* ensures the font is active from the very first render.                 */
  window.tty_options = Object.assign(window.tty_options || {}, {
    fontFamily: "'VT323', 'Courier New', monospace",
    fontSize:   18,
  });

  /* ── Static overlays ───────────────────────────────────────────────── */
  var overlay = document.createElement('div');
  overlay.id = 'crt-overlay';
  document.body.appendChild(overlay);

  var glowLine = document.createElement('div');
  glowLine.id = 'crt-glow-line';
  document.body.appendChild(glowLine);

  /* ── Phosphor profiles ─────────────────────────────────────────────── */
  var profiles = [
    { name: 'AMBER', bg: '#0d0800', glow: 'rgba(255,152,0,0.40)',
      filter: 'sepia(1) saturate(5) hue-rotate(5deg) brightness(1.15) contrast(1.08)',
      bloom:  'sepia(1) saturate(5) hue-rotate(5deg)' },
    { name: 'GREEN', bg: '#00100a', glow: 'rgba(0,255,80,0.35)',
      filter: 'sepia(1) saturate(8) hue-rotate(80deg) brightness(1.10) contrast(1.10)',
      bloom:  'sepia(1) saturate(8) hue-rotate(80deg)' },
    { name: 'WHITE', bg: '#0a0a0d', glow: 'rgba(180,200,255,0.30)',
      filter: 'brightness(1.10) contrast(1.15) saturate(0.20)',
      bloom:  'saturate(0.20)' },
    { name: 'APPLE', bg: '#001400', glow: 'rgba(0,255,100,0.40)',
      filter: 'sepia(1) saturate(10) hue-rotate(95deg) brightness(1.20) contrast(1.05)',
      bloom:  'sepia(1) saturate(10) hue-rotate(95deg)' },
  ];
  var profileIdx = 0;

  function applyProfile(p) {
    var s = document.documentElement.style;
    s.setProperty('--crt-bg',     p.bg);
    s.setProperty('--crt-glow',   p.glow);
    s.setProperty('--crt-filter', p.filter);
    document.body.style.background = p.bg;
    if (btn) btn.textContent = '[ ' + p.name + ' ]';
    var bc = document.getElementById('crt-bloom-canvas');
    if (bc) bc.style.filter = p.bloom;
  }

  var btn = document.createElement('button');
  btn.id = 'crt-profile-btn';
  btn.textContent = '[ AMBER ]';
  btn.addEventListener('click', function () {
    profileIdx = (profileIdx + 1) % profiles.length;
    applyProfile(profiles[profileIdx]);
  });
  document.body.appendChild(btn);

  /* ── Animated film-grain noise ─────────────────────────────────────── */
  var turbulence = document.getElementById('crt-turbulence');
  var noiseSeed  = 0;
  (function tickNoise() {
    noiseSeed = (noiseSeed + 1) & 0x3FF;
    turbulence.setAttribute('seed', noiseSeed);
    setTimeout(function () { requestAnimationFrame(tickNoise); }, 80);
  }());

  /* ── Horizontal jitter ─────────────────────────────────────────────── */
  function scheduleJitter() {
    setTimeout(function () {
      var tc = document.getElementById('terminal-container');
      if (tc) {
        tc.classList.remove('crt-jitter');
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            tc.classList.add('crt-jitter');
            setTimeout(function () { tc.classList.remove('crt-jitter'); }, 120);
          });
        });
      }
      scheduleJitter();
    }, 4000 + Math.random() * 14000);   /* every 4–18 s at random */
  }
  scheduleJitter();

  /* ── Bloom ─────────────────────────────────────────────────────────── */
  /* Canvas lives outside .xterm so the parent sepia/brightness filter    */
  /* does not re-amplify it.                                               */
  /* brightness(4) first: lifts dark ANSI colours (min channel ~0.5) to   */
  /* white before contrast clips them, so every character glows evenly.   */
  /* Pure black background (0,0,0) × 4 = 0 — no background contribution. */
  function setupBloom() {
    var screen = document.querySelector('.xterm-screen');
    if (!screen) { setTimeout(setupBloom, 200); return; }

    var bloomWrap    = document.createElement('div');
    bloomWrap.id     = 'crt-bloom';
    var bloomCanvas  = document.createElement('canvas');
    bloomCanvas.id   = 'crt-bloom-canvas';
    bloomWrap.appendChild(bloomCanvas);
    document.body.appendChild(bloomWrap);
    var bloomCtx     = bloomCanvas.getContext('2d');

    var tmp    = document.createElement('canvas');
    var tmpCtx = tmp.getContext('2d');

    var SCALE = 0.25;

    function resize() {
      var w = Math.max(1, Math.round(screen.offsetWidth  * SCALE));
      var h = Math.max(1, Math.round(screen.offsetHeight * SCALE));
      tmp.width  = bloomCanvas.width  = w;
      tmp.height = bloomCanvas.height = h;
      /* Size the CSS canvas to cover the terminal area */
      var r = screen.getBoundingClientRect();
      bloomCanvas.style.left   = r.left   + 'px';
      bloomCanvas.style.top    = r.top    + 'px';
      bloomCanvas.style.width  = r.width  + 'px';
      bloomCanvas.style.height = r.height + 'px';
    }
    resize();
    new ResizeObserver(resize).observe(screen);
    window.addEventListener('resize', resize);

    var lastFrame = 0;
    function tick(ts) {
      requestAnimationFrame(tick);
      if (ts - lastFrame < 50) return;   /* ~20 fps */
      lastFrame = ts;

      var w = tmp.width, h = tmp.height;
      if (!w || !h) return;

      /* Pass 1 — composite all xterm layers unfiltered */
      tmpCtx.clearRect(0, 0, w, h);
      screen.querySelectorAll('canvas').forEach(function (c) {
        if (c === bloomCanvas) return;
        try { tmpCtx.drawImage(c, 0, 0, w, h); } catch (e) {}
      });

      /* Pass 2 — brightness lifts dark chars, contrast clips bg to black,
                  blur spreads the bright pixels into a halo             */
      bloomCtx.clearRect(0, 0, w, h);
      bloomCtx.filter = 'blur(2px)';
      bloomCtx.drawImage(tmp, 0, 0);
      bloomCtx.filter = 'none';
    }
    requestAnimationFrame(tick);
  }
  setupBloom();

  /* ── Power-on sweep ────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {
    document.body.classList.add('crt-boot');
  });

}());
</script>
