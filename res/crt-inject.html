<!-- ============================================================
     CRT visual effects — Amber Phosphor profile
     Inspired by cool-retro-term (github.com/Swordfish90/cool-retro-term)
     Auto-injected before </body> by the release workflow.
     ============================================================ -->

<!-- VT323 pixel font -->
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap">

<!-- SVG filter definitions.                                              -->
<!-- Must NOT be display:none — browsers refuse to resolve url(#id)       -->
<!-- references into a display:none element. Zero-size keeps it invisible. -->
<svg id="crt-filters-svg" aria-hidden="true" focusable="false"
     style="position:absolute;width:0;height:0;overflow:hidden">

  <filter id="crt-noise-filter" color-interpolation-filters="linearRGB"
          x="0%" y="0%" width="100%" height="100%">
    <feTurbulence id="crt-turbulence"
      type="fractalNoise" baseFrequency="0.75"
      numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>

</svg>

<!-- Noise overlay -->
<svg id="crt-noise-svg" aria-hidden="true" focusable="false"
     style="position:fixed;inset:0;width:100%;height:100%;
            pointer-events:none;z-index:8999;mix-blend-mode:screen;">
  <rect width="100%" height="100%" filter="url(#crt-noise-filter)"/>
</svg>

<style id="crt-styles">

/* ── CSS variables ──────────────────────────────────────────────────── */
:root {
  --crt-bg:           #0f0802;
  --crt-glow:         rgba(255, 129, 0, 0.40);
  --crt-glow-rgb:     255, 129, 0;
  --crt-filter:       brightness(1.10) contrast(1.08);
  --crt-scanlines:    0.13;   /* driven by scanlines slider   */
  --crt-flicker-amt:  0.08;   /* driven by flickering slider  */
  --crt-jitter-px:    1px;    /* driven by jitter slider      */
}

/* ── Base background ────────────────────────────────────────────────── */
/* xterm-viewport is the scrollable container behind the WebGL canvas.  */
/* Forcing its background here makes the phosphor ambient colour appear  */
/* immediately on paint, before window.term is available to set the      */
/* xterm theme — so the boot animation already shows the right colour.  */
html, body { background: var(--crt-bg) !important; }
.xterm-viewport { background-color: var(--crt-bg) !important; }

/* ── Phosphor tint ──────────────────────────────────────────────────── */
.xterm { filter: var(--crt-filter) !important; }

/* ── Rounded bezel ──────────────────────────────────────────────────── */
#terminal-container {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0, 0, 0, 0.95);
}

/* ── Bloom ──────────────────────────────────────────────────────────── */
#crt-bloom {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 8998;
  mix-blend-mode: screen;
  opacity: 0.20;
  transition: opacity 0.2s;
}
#crt-bloom-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  /* blur(40px) spreads the thresholded text mask into wide, soft halos.   */
  /* No post-blur brightness step — that causes a ring artifact by         */
  /* amplifying the steep part of the Gaussian falloff more than the tail. */
  filter: blur(40px);
}

/* ── Scanlines ──────────────────────────────────────────────────────── */
#crt-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9000;
  border-radius: 10px;
}
#crt-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent                          0px,
    transparent                          2px,
    rgba(0,0,0,var(--crt-scanlines))     2px,
    rgba(0,0,0,var(--crt-scanlines))     4px
  );
}

/* ── Jitter ─────────────────────────────────────────────────────────── */
@keyframes crt-jitter {
  0%,100% { transform: translateX(0); }
  15%     { transform: translateX(calc(var(--crt-jitter-px) * -1)); }
  30%     { transform: translateX(var(--crt-jitter-px)); }
  45%     { transform: translateX(calc(var(--crt-jitter-px) * -1)); }
  60%     { transform: translateX(var(--crt-jitter-px)); }
  75%     { transform: translateX(0); }
}
#terminal-container.crt-jitter { animation: crt-jitter 0.12s linear; }

/* ── Glow line ──────────────────────────────────────────────────────── */
@keyframes crt-glow-line {
  0%   { transform: translateY(-220px); }
  100% { transform: translateY(100vh);  }
}
#crt-glow-line {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 220px;
  pointer-events: none;
  z-index: 9001;
  mix-blend-mode: screen;
  background: linear-gradient(
    to bottom,
    rgba(var(--crt-glow-rgb), 0)     0%,
    rgba(var(--crt-glow-rgb), 0.02) 45%,
    rgba(var(--crt-glow-rgb), 0.06) 72%,
    rgba(var(--crt-glow-rgb), 0.12) 86%,
    rgba(var(--crt-glow-rgb), 0.25) 95%,
    rgba(var(--crt-glow-rgb), 0.06) 98%,
    rgba(var(--crt-glow-rgb), 0)   100%
  );
  animation: crt-glow-line 8s linear infinite;
  transition: opacity 0.2s;
}

/* ── Flicker ────────────────────────────────────────────────────────── */
/* --crt-flicker-amt drives all dip depths so the slider controls them   */
/* proportionally without rewriting keyframe values.                     */
@keyframes crt-flicker {
  0%,92%,100% { opacity: 1; }
  93%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.50); }
  94%  { opacity: 1; }
  95%  { opacity: calc(1 - var(--crt-flicker-amt)); }
  96%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.25); }
  97%  { opacity: 1; }
  98%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.75); }
  99%  { opacity: 1; }
}

/* ── Power-on sweep ─────────────────────────────────────────────────── */
@keyframes crt-poweron {
  0%   { clip-path: inset(49.6% 0 49.6% 0); filter: brightness(4);   }
  25%  { clip-path: inset(20%   0 20%   0); filter: brightness(3);   }
  65%  { clip-path: inset(0%    0 0%    0); filter: brightness(1.4); }
  100% { clip-path: inset(0%    0 0%    0); }
}
body { animation: crt-flicker 10s steps(1) infinite; }
body.crt-boot {
  animation:
    crt-poweron 0.7s cubic-bezier(.4,0,.2,1) forwards,
    crt-flicker 10s 0.7s steps(1) infinite;
}

/* ── Settings menu ──────────────────────────────────────────────────── */
#crt-menu {
  position: fixed;
  bottom: 10px;
  right: 12px;
  z-index: 9200;
  font-family: 'VT323', monospace;
  font-size: 15px;
  letter-spacing: 1px;
  user-select: none;
}
#crt-menu-btn {
  display: block;
  margin-left: auto;
  padding: 3px 9px;
  background: rgba(0,0,0,0.55);
  color: rgba(var(--crt-menu-rgb),0.80);
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  letter-spacing: inherit;
  transition: opacity 0.2s;
  opacity: 0.6;
}
#crt-menu-btn:hover { opacity: 1; }
#crt-menu-panel {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  min-width: 210px;
  background: rgba(0,0,0,0.90);
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  border-radius: 3px;
  padding: 8px 10px 10px;
}
#crt-menu-panel.open { display: block; }

.crt-menu-section {
  color: rgba(var(--crt-menu-rgb),0.45);
  font-size: 12px;
  letter-spacing: 2px;
  margin: 8px 0 4px;
  padding-bottom: 2px;
  border-bottom: 1px solid rgba(var(--crt-menu-rgb),0.15);
}
.crt-menu-section:first-child { margin-top: 0; }

/* Profile row */
.crt-menu-profile {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  color: rgba(var(--crt-menu-rgb),0.90);
  padding: 2px 0;
}
.crt-menu-profile button {
  background: none;
  border: none;
  color: rgba(var(--crt-menu-rgb),1);
  opacity: 0.6;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 0 2px;
  line-height: 1;
  transition: opacity 0.1s;
}
.crt-menu-profile button:hover { opacity: 1; }
#crt-profile-label { flex: 1; text-align: center; }

/* Effect rows */
.crt-effect-row { margin: 5px 0 2px; }
.crt-effect-header {
  display: flex;
  align-items: baseline;
  gap: 5px;
  color: rgba(var(--crt-menu-rgb),0.80);
}
.crt-effect-header.dim { color: rgba(var(--crt-menu-rgb),0.30); }
.crt-effect-label { flex: 1; }
.crt-effect-value { font-size: 13px; min-width: 26px; text-align: right; }
.crt-effect-toggle {
  background: none;
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  color: rgba(var(--crt-menu-rgb),0.70);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 0;
  padding: 0 4px;
  border-radius: 2px;
  line-height: 1.4;
}
.crt-effect-toggle:hover { color: rgba(var(--crt-menu-rgb),1); border-color: rgba(var(--crt-menu-rgb),0.60); }
.crt-effect-toggle.off   { color: rgba(var(--crt-menu-rgb),0.30); border-color: rgba(var(--crt-menu-rgb),0.15); }

/* Range slider */
.crt-slider {
  -webkit-appearance: none;
  appearance: none;
  display: block;
  width: 100%;
  height: 2px;
  background: rgba(var(--crt-menu-rgb),0.20);
  outline: none;
  border: none;
  cursor: pointer;
  margin: 3px 0 0;
  padding: 0;
}
.crt-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 8px;
  height: 14px;
  background: rgba(var(--crt-menu-rgb),0.85);
  border-radius: 1px;
  cursor: pointer;
}
.crt-slider::-moz-range-thumb {
  width: 8px;
  height: 14px;
  background: rgba(var(--crt-menu-rgb),0.85);
  border-radius: 1px;
  border: none;
  cursor: pointer;
}
.crt-slider:disabled {
  opacity: 0.25;
  cursor: default;
}

</style>

<script id="crt-script">
/* Force preserveDrawingBuffer on WebGL contexts so the bloom canvas     */
/* can read back pixels. Must run before xterm.js initialises.           */
(function () {
  var _orig = HTMLCanvasElement.prototype.getContext;
  HTMLCanvasElement.prototype.getContext = function (type, attrs) {
    if (type === 'webgl' || type === 'webgl2')
      attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
    return _orig.call(this, type, attrs);
  };
}());

(function () {
  'use strict';

  /* ── Colour helpers ────────────────────────────────────────────────── */
  function h2a(h) {
    var v = parseInt(h.replace('#', ''), 16);
    return [v >> 16 & 255, v >> 8 & 255, v & 255];
  }
  function a2h(r, g, b) {
    return '#' + [r, g, b].map(function (c) {
      return ('0' + Math.max(0, Math.min(255, Math.round(c))).toString(16)).slice(-2);
    }).join('');
  }

  /* ── Phosphor colour formula ───────────────────────────────────────── */
  /* Exact replication of cool-retro-term ApplicationSettings.qml:        */
  /*   saturatedColor = mix(rawFg, white, satColor × 0.5)                 */
  /*   fgRendered     = mix(rawBg, saturatedColor, 0.7 + contrast × 0.3)  */
  /*   bgRendered     = mix(saturatedColor, rawBg, 0.7 + contrast × 0.3)  */
  /* Both fg and bg vary with contrast — contrast shifts fg brightness     */
  /* AND adds a white-mix component (e.g. blue channel) from satColor.    */
  var contrastLevel = 0.80;   /* driven by contrast slider */

  function computePhosphorColors(rawFgHex, rawBgHex, satColor, contrast) {
    var f = h2a(rawFgHex), b = h2a(rawBgHex);
    var s = satColor * 0.5;
    var sc = [f[0]*(1-s) + 255*s, f[1]*(1-s) + 255*s, f[2]*(1-s) + 255*s];
    var mix = 0.7 + contrast * 0.3;
    return {
      fg: a2h(b[0]*(1-mix) + sc[0]*mix, b[1]*(1-mix) + sc[1]*mix, b[2]*(1-mix) + sc[2]*mix),
      bg: a2h(sc[0]*(1-mix) + b[0]*mix, sc[1]*(1-mix) + b[1]*mix, sc[2]*(1-mix) + b[2]*mix),
    };
  }

  /* ── Phosphor palette helper ───────────────────────────────────────── */
  /* Generates a monochrome 16-colour xterm theme tinted to a phosphor    */
  /* colour. Each ANSI slot maps to a lerp between bg (off) and fg (full) */
  /* at a brightness level chosen to preserve visual differentiation.     */
  function makePhosphorTheme(fgHex, bgHex) {
    var f = h2a(fgHex), bk = h2a(bgHex);
    function lerp(t) {
      return a2h(bk[0] + (f[0] - bk[0]) * t,
                 bk[1] + (f[1] - bk[1]) * t,
                 bk[2] + (f[2] - bk[2]) * t);
    }
    function boost(t) { return a2h(f[0] * t, f[1] * t, f[2] * t); }
    return {
      foreground: fgHex,  background: bgHex,
      cursor:     fgHex,  cursorAccent: bgHex,
      black:         bgHex,      red:           lerp(0.55),
      green:         lerp(0.65), yellow:        lerp(0.80),
      blue:          lerp(0.35), magenta:       lerp(0.60),
      cyan:          lerp(0.70), white:         lerp(0.85),
      brightBlack:   lerp(0.25), brightRed:     lerp(0.70),
      brightGreen:   lerp(0.80), brightYellow:  fgHex,
      brightBlue:    lerp(0.50), brightMagenta: lerp(0.80),
      brightCyan:    lerp(0.90), brightWhite:   boost(1.15),
    };
  }

  /* ── VT323 font ────────────────────────────────────────────────────── */
  (function () {
    var c = computePhosphorColors('#ff8100', '#000000', 0.2, contrastLevel);
    window.tty_options = Object.assign(window.tty_options || {}, {
      fontFamily: "'VT323', 'Courier New', monospace",
      fontSize:   18,
      theme:      makePhosphorTheme(c.fg, c.bg),
    });
  }());

  /* ── Static overlays ───────────────────────────────────────────────── */
  var overlay = document.createElement('div');
  overlay.id  = 'crt-overlay';

  var glowLine = document.createElement('div');
  glowLine.id  = 'crt-glow-line';

  function setupOverlays() {
    var tc = document.getElementById('terminal-container');
    if (!tc) { setTimeout(setupOverlays, 100); return; }
    tc.appendChild(overlay);
    tc.appendChild(glowLine);
  }
  setupOverlays();

  /* ── Phosphor profiles ─────────────────────────────────────────────── */
  /* rawFg/rawBg/satColor sourced from cool-retro-term ApplicationSettings.qml. */
  /* fg/bg are computed at runtime by computePhosphorColors so they track   */
  /* the contrast slider. E-Ink keeps a fixed CSS invert approach.          */
  var profiles = [
    { name: 'MONO GREEN', rawFg: '#0ccc68', rawBg: '#000000', satColor: 0.0,
      glow: 'rgba(12,204,104,0.35)',   filter: 'brightness(1.05)',
      bloom: 'blur(40px)', menuRgb: '12, 204, 104' },
    { name: 'GHOST',      rawFg: '#a6b3c0', rawBg: '#0b1014', satColor: 0.0,
      glow: 'rgba(166,179,192,0.20)', filter: 'brightness(0.95)',
      bloom: 'blur(40px)', menuRgb: '166, 179, 192' },
    { name: 'NEON CYAN',  rawFg: '#52f7ff', rawBg: '#001018', satColor: 0.6,
      glow: 'rgba(82,247,255,0.40)',  filter: 'brightness(1.05)',
      bloom: 'blur(40px)', menuRgb: '82, 247, 255' },
    /* Boring: white phosphor on black, no saturation mixing.               */
    { name: 'BORING', rawFg: '#ffffff', rawBg: '#000000', satColor: 0.0,
      glow: 'rgba(220,220,220,0.25)', filter: 'brightness(1.00)',
      bloom: 'blur(40px)', menuRgb: '220, 220, 220' },
    /* E-Ink: fixed light bg; CSS invert+grayscale handles display reversal. */
    { name: 'E-INK', rawFg: null, rawBg: '#f2f2ec',
      glow: 'rgba(16,16,16,0.10)',
      filter: 'invert(1) grayscale(1) brightness(0.95) contrast(0.85)',
      bloom: 'grayscale(1) blur(40px)', menuRgb: '100, 100, 90', xtermTheme: null },
    { name: 'AMBER',     rawFg: '#ff8100', rawBg: '#000000', satColor: 0.2,
      glow: 'rgba(255,129,0,0.40)',  filter: 'brightness(1.05)',
      bloom: 'blur(40px)', menuRgb: '255, 129, 0' },
    { name: 'DEEP BLUE', rawFg: '#7fb4ff', rawBg: '#000000', satColor: 0.2,
      glow: 'rgba(127,180,255,0.35)', filter: 'brightness(1.05)',
      bloom: 'blur(40px)', menuRgb: '127, 180, 255' },
  ];
  var profileIdx = 5; /* Default: AMBER */

  /* Inject a <style> block with hardcoded RGB values so there are no CSS   */
  /* variable references that browsers can stale-cache on profile changes.  */
  var menuThemeStyle = document.createElement('style');
  document.body.appendChild(menuThemeStyle);

  function updateMenuTheme(rgb) {
    menuThemeStyle.textContent =
      '#crt-menu-btn{color:rgba('+rgb+',0.80);border-color:rgba('+rgb+',0.30);}' +
      '#crt-menu-panel{border-color:rgba('+rgb+',0.30);}' +
      '.crt-menu-section{color:rgba('+rgb+',0.45);border-bottom-color:rgba('+rgb+',0.15);}' +
      '.crt-menu-profile{color:rgba('+rgb+',0.90);}' +
      '.crt-menu-profile button{color:rgba('+rgb+',1);}' +
      '.crt-effect-header{color:rgba('+rgb+',0.80);}' +
      '.crt-effect-header.dim{color:rgba('+rgb+',0.30);}' +
      '.crt-effect-toggle{border-color:rgba('+rgb+',0.30);color:rgba('+rgb+',0.70);}' +
      '.crt-effect-toggle:hover{color:rgba('+rgb+',1);border-color:rgba('+rgb+',0.60);}' +
      '.crt-effect-toggle.off{color:rgba('+rgb+',0.30);border-color:rgba('+rgb+',0.15);}' +
      '.crt-slider{background:rgba('+rgb+',0.20);}' +
      '.crt-slider::-webkit-slider-thumb{background:rgba('+rgb+',0.85);}' +
      '.crt-slider::-moz-range-thumb{background:rgba('+rgb+',0.85);}';
  }
  /* Update xterm.js terminal colour theme at runtime via window.term.     */
  /* window.term is set asynchronously by ttyd after our script runs, so  */
  /* applyXtermTheme polls until it is available.                         */
  /* Optional cb is called once the theme is applied (used for boot anim) */
  function applyXtermTheme(theme, cb) {
    if (!theme) { if (cb) cb(); return; }
    if (window.term && window.term.options) {
      try { window.term.options.theme = theme; } catch (e) {}
      /* Double rAF: first rAF lets xterm schedule its redraw, second waits */
      /* for that redraw to actually land on the canvas before boot reveals  */
      /* the terminal content via the clip-path sweep.                       */
      if (cb) requestAnimationFrame(function () { requestAnimationFrame(cb); });
    } else {
      setTimeout(function () { applyXtermTheme(theme, cb); }, 50);
    }
  }

  /* Returns {fg, bg, theme} for a profile at the current contrastLevel.   */
  function computeColors(p) {
    if (!p.rawFg) return { fg: null, bg: p.rawBg, theme: p.xtermTheme || null };
    var c = computePhosphorColors(p.rawFg, p.rawBg, p.satColor, contrastLevel);
    return { fg: c.fg, bg: c.bg, theme: makePhosphorTheme(c.fg, c.bg) };
  }

  /* Apply initial profile immediately so JS state matches CSS defaults.   */
  (function () {
    var p = profiles[profileIdx];
    var c = computeColors(p);
    var s = document.documentElement.style;
    s.setProperty('--crt-bg',       c.bg);
    s.setProperty('--crt-glow',     p.glow);
    s.setProperty('--crt-glow-rgb', p.menuRgb);
    s.setProperty('--crt-filter',   p.filter);
    document.body.style.background = c.bg;
    updateMenuTheme(p.menuRgb);
    applyXtermTheme(c.theme, function () {
      document.body.classList.add('crt-boot');
    });
  }());

  function applyProfile(p) {
    var c = computeColors(p);
    var s = document.documentElement.style;
    s.setProperty('--crt-bg',       c.bg);
    s.setProperty('--crt-glow',     p.glow);
    s.setProperty('--crt-glow-rgb', p.menuRgb);
    s.setProperty('--crt-filter',   p.filter);
    document.body.style.background = c.bg;
    var bc = document.getElementById('crt-bloom-canvas');
    if (bc) bc.style.filter = p.bloom;
    var lbl = document.getElementById('crt-profile-label');
    if (lbl) lbl.textContent = p.name;
    updateMenuTheme(p.menuRgb);
    applyXtermTheme(c.theme);
  }

  /* ── Effect definitions ────────────────────────────────────────────── */
  /* Each effect has:                                                      */
  /*   label    — display name                                             */
  /*   default  — initial slider value (0–100)                            */
  /*   apply(v) — called on every slider change with value 0–100          */
  /* ─────────────────────────────────────────────────────────────────── */
  var jitterStrength = 15;   /* read by scheduleJitter */

  var effectDefs = [
    {
      id: 'bloom', label: 'BLOOM', default: 50,
      /* Map 0–100% directly to 0–1.0 opacity. blur(20px)+brightness(2)   */
      /* on the canvas already limits overshoot; screen blend on a dark    */
      /* background saturates gracefully so opacity 1.0 is safe.          */
      apply: function (v) {
        var el = document.getElementById('crt-bloom');
        if (el) el.style.opacity = (v / 100).toFixed(3);
      },
    },
    {
      id: 'glowline', label: 'GLOW LINE', default: 15,
      apply: function (v) {
        var el = document.getElementById('crt-glow-line');
        if (el) el.style.opacity = (v / 100).toFixed(2);
      },
    },
    {
      id: 'scanlines', label: 'SCANLINES', default: 25,
      /* 26% → 0.13 (current default). Max 100% → 0.50.                 */
      apply: function (v) {
        document.documentElement.style.setProperty(
          '--crt-scanlines', (v / 100 * 0.5).toFixed(3));
      },
    },
    {
      id: 'noise', label: 'FILM GRAIN', default: 15,
      /* 15% → opacity 0.08 (≈ noise at reference strength).             */
      apply: function (v) {
        var el = document.getElementById('crt-noise-svg');
        if (el) el.style.opacity = (v / 100 * 0.53).toFixed(3);
      },
    },
    {
      id: 'jitter', label: 'JITTER', default: 15,
      /* Controls both interval frequency and pixel displacement.         */
      apply: function (v) {
        jitterStrength = v;
        var px = (v / 100 * 4).toFixed(2) + 'px';
        document.documentElement.style.setProperty('--crt-jitter-px', px);
      },
    },
    {
      id: 'flicker', label: 'FLICKERING', default: 10,
      /* --crt-flicker-amt is used directly in the keyframe calc().       */
      /* 10% → 0.08 amt. Max 100% → 0.80 amt (very deep dips).           */
      apply: function (v) {
        if (v === 0) {
          document.body.style.animationPlayState = 'paused';
        } else {
          document.body.style.animationPlayState = 'running';
          document.documentElement.style.setProperty(
            '--crt-flicker-amt', (v / 100 * 0.8).toFixed(3));
        }
      },
    },
    {
      id: 'contrast', label: 'CONTRAST', default: 80,
      /* Replicates cool-retro-term's contrast knob: shifts both fg and bg. */
      /* 100% = saturatedColor fg / black bg. 0% = ~30% of phosphor on bg.  */
      /* Only affects phosphor profiles that have a rawFg colour.           */
      apply: function (v) {
        contrastLevel = v / 100;
        var p = profiles[profileIdx];
        if (!p.rawFg) return;
        var c = computePhosphorColors(p.rawFg, p.rawBg, p.satColor, contrastLevel);
        document.documentElement.style.setProperty('--crt-bg', c.bg);
        document.body.style.background = c.bg;
        if (window.term && window.term.options) {
          try { window.term.options.theme = makePhosphorTheme(c.fg, c.bg); } catch (e) {}
        }
      },
    },
  ];

  /* ── Settings menu ─────────────────────────────────────────────────── */
  var menu  = document.createElement('div');
  menu.id   = 'crt-menu';
  var panel = document.createElement('div');
  panel.id  = 'crt-menu-panel';

  /* Profile section */
  var profSection = document.createElement('div');
  profSection.className = 'crt-menu-section';
  profSection.textContent = 'PROFILE';
  panel.appendChild(profSection);

  var profRow = document.createElement('div');
  profRow.className = 'crt-menu-profile';
  var prevBtn = document.createElement('button');
  prevBtn.textContent = '◄';
  prevBtn.addEventListener('click', function () {
    profileIdx = (profileIdx - 1 + profiles.length) % profiles.length;
    applyProfile(profiles[profileIdx]);
  });

  var profLabel = document.createElement('span');
  profLabel.id = 'crt-profile-label';
  profLabel.textContent = profiles[profileIdx].name;

  var nextBtn = document.createElement('button');
  nextBtn.textContent = '►';
  nextBtn.addEventListener('click', function () {
    profileIdx = (profileIdx + 1) % profiles.length;
    applyProfile(profiles[profileIdx]);
  });
  profRow.appendChild(prevBtn);
  profRow.appendChild(profLabel);
  profRow.appendChild(nextBtn);
  panel.appendChild(profRow);

  /* Effects section */
  var fxSection = document.createElement('div');
  fxSection.className = 'crt-menu-section';
  fxSection.textContent = 'EFFECTS';
  panel.appendChild(fxSection);

  effectDefs.forEach(function (def) {
    var enabled    = true;
    var savedValue = def.default;

    var row = document.createElement('div');
    row.className = 'crt-effect-row';

    var header = document.createElement('div');
    header.className = 'crt-effect-header';

    var lbl = document.createElement('span');
    lbl.className   = 'crt-effect-label';
    lbl.textContent = def.label;

    var toggleBtn = document.createElement('button');
    toggleBtn.className   = 'crt-effect-toggle';
    toggleBtn.textContent = 'ON';

    var valDisplay = document.createElement('span');
    valDisplay.className   = 'crt-effect-value';
    valDisplay.textContent = def.default + '%';

    header.appendChild(lbl);
    header.appendChild(toggleBtn);
    header.appendChild(valDisplay);

    var slider = document.createElement('input');
    slider.type      = 'range';
    slider.className = 'crt-slider';
    slider.min       = '0';
    slider.max       = '100';
    slider.value     = String(def.default);

    slider.addEventListener('input', function () {
      var v = parseInt(this.value, 10);
      valDisplay.textContent = v + '%';
      def.apply(v);
    });

    toggleBtn.addEventListener('click', function () {
      enabled = !enabled;
      if (enabled) {
        slider.disabled         = false;
        slider.value            = String(savedValue);
        valDisplay.textContent  = savedValue + '%';
        header.className        = 'crt-effect-header';
        toggleBtn.textContent   = 'ON';
        toggleBtn.className     = 'crt-effect-toggle';
        def.apply(savedValue);
      } else {
        savedValue              = parseInt(slider.value, 10);
        slider.disabled         = true;
        header.className        = 'crt-effect-header dim';
        toggleBtn.textContent   = 'OFF';
        toggleBtn.className     = 'crt-effect-toggle off';
        def.apply(0);
      }
    });

    /* Apply initial value */
    def.apply(def.default);

    row.appendChild(header);
    row.appendChild(slider);
    panel.appendChild(row);
  });

  /* Toggle button */
  var menuBtn = document.createElement('button');
  menuBtn.id = 'crt-menu-btn';
  menuBtn.textContent = '[ CRT ]';
  menuBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    panel.classList.toggle('open');
  });
  document.addEventListener('click', function () {
    panel.classList.remove('open');
  });
  panel.addEventListener('click', function (e) { e.stopPropagation(); });

  menu.appendChild(panel);
  menu.appendChild(menuBtn);
  document.body.appendChild(menu);

  /* ── Animated film-grain noise ─────────────────────────────────────── */
  var turbulence = document.getElementById('crt-turbulence');
  var noiseSeed  = 0;
  (function tickNoise() {
    noiseSeed = (noiseSeed + 1) & 0x3FF;
    turbulence.setAttribute('seed', noiseSeed);
    setTimeout(function () { requestAnimationFrame(tickNoise); }, 80);
  }());

  /* ── Horizontal jitter ─────────────────────────────────────────────── */
  /* Interval scales with strength: 0% = never, 100% = very frequent.    */
  function scheduleJitter() {
    var gap = jitterStrength === 0
      ? 60000
      : Math.max(300, (100 - jitterStrength) * 150)
        + Math.random() * Math.max(300, (100 - jitterStrength) * 100);
    setTimeout(function () {
      if (jitterStrength > 0) {
        var tc = document.getElementById('terminal-container');
        if (tc) {
          tc.classList.remove('crt-jitter');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              tc.classList.add('crt-jitter');
              setTimeout(function () { tc.classList.remove('crt-jitter'); }, 120);
            });
          });
        }
      }
      scheduleJitter();
    }, gap);
  }
  scheduleJitter();

  /* ── Bloom ─────────────────────────────────────────────────────────── */
  function setupBloom() {
    var screen = document.querySelector('.xterm-screen');
    if (!screen) { setTimeout(setupBloom, 200); return; }

    var bloomWrap   = document.createElement('div');
    bloomWrap.id    = 'crt-bloom';
    var bloomCanvas = document.createElement('canvas');
    bloomCanvas.id  = 'crt-bloom-canvas';
    bloomWrap.appendChild(bloomCanvas);
    document.body.appendChild(bloomWrap);
    var bloomCtx = bloomCanvas.getContext('2d');

    var tmp        = document.createElement('canvas');
    var tmpCtx     = tmp.getContext('2d');
    var extract    = document.createElement('canvas');
    var extractCtx = extract.getContext('2d');
    var SCALE      = 0.50;

    function resize() {
      var w = Math.max(1, Math.round(screen.offsetWidth  * SCALE));
      var h = Math.max(1, Math.round(screen.offsetHeight * SCALE));
      tmp.width  = extract.width  = bloomCanvas.width  = w;
      tmp.height = extract.height = bloomCanvas.height = h;
      var r = screen.getBoundingClientRect();
      bloomCanvas.style.left   = r.left   + 'px';
      bloomCanvas.style.top    = r.top    + 'px';
      bloomCanvas.style.width  = r.width  + 'px';
      bloomCanvas.style.height = r.height + 'px';
    }
    resize();
    new ResizeObserver(resize).observe(screen);
    window.addEventListener('resize', resize);

    var lastFrame = 0;
    function tick(ts) {
      requestAnimationFrame(tick);
      if (ts - lastFrame < 50) return;
      lastFrame = ts;
      var w = tmp.width, h = tmp.height;
      if (!w || !h) return;

      /* Pass 1 — composite all xterm canvas layers at half resolution.    */
      tmpCtx.clearRect(0, 0, w, h);
      screen.querySelectorAll('canvas').forEach(function (c) {
        if (c === bloomCanvas) return;
        try { tmpCtx.drawImage(c, 0, 0, w, h); } catch (e) {}
      });

      /* Adaptive brightness: target the background intensity to land     */
      /* safely below the contrast threshold (0.5). This ensures the      */
      /* background is crushed to absolute black regardless of the        */
      /* contrast slider setting, keeping the bloom mask stable.          */
      var _p = profiles[profileIdx];
      var _bg = _p.rawFg
        ? computePhosphorColors(_p.rawFg, _p.rawBg, _p.satColor, contrastLevel).bg
        : _p.rawBg;
      var _bgc = h2a(_bg);
      var _bgMax = Math.max(_bgc[0], _bgc[1], _bgc[2]);
      /* 120 / bgMax targets ~0.47, safely below the 0.5 threshold.       */
      /* Max gain 15x ensures text survives even at 0.0 contrast.         */
      var _brt = _bgMax > 8 ? (120 / _bgMax) : 15;

      /* Pass 2 — minimal blur to smooth glyphs without killing intensity. */
      /* 1px blur at SCALE=0.5 preserves peak brightness for the threshold. */
      extractCtx.clearRect(0, 0, w, h);
      extractCtx.filter = 'blur(1px)';
      extractCtx.drawImage(tmp, 0, 0);
      extractCtx.filter = 'none';

      /* Pass 3 — threshold and colorize: extract a binary mask and fill   */
      /* it with the phosphor color. grayscale(1) MUST be first to prevent */
      /* red-channel clipping artifacts during high-gain thresholding.     */
      bloomCtx.globalCompositeOperation = 'source-over';
      bloomCtx.clearRect(0, 0, w, h);
      bloomCtx.fillStyle = '#000';
      bloomCtx.fillRect(0, 0, w, h);

      bloomCtx.filter = 'grayscale(1) brightness(' + _brt.toFixed(2) + ') contrast(12)';
      bloomCtx.drawImage(extract, 0, 0);
      bloomCtx.filter = 'none';

      /* Multiply the binary mask with the profile's phosphor color.      */
      /* Black stays black (transparent in 'screen' blend mode); white    */
      /* becomes the target phosphor hue.                                 */
      bloomCtx.globalCompositeOperation = 'multiply';
      bloomCtx.fillStyle = 'rgb(' + _p.menuRgb + ')';
      bloomCtx.fillRect(0, 0, w, h);
      bloomCtx.globalCompositeOperation = 'source-over';
    }
    requestAnimationFrame(tick);
  }
  setupBloom();

  /* Power-on sweep is triggered by applyXtermTheme's callback above,     */
  /* so the animation plays only after the phosphor theme is applied.     */

}());
</script>
