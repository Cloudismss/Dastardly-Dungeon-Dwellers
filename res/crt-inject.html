<!-- ============================================================
     CRT visual effects — Amber Phosphor profile
     Inspired by cool-retro-term (github.com/Swordfish90/cool-retro-term)
     Auto-injected before </body> by the release workflow.
     ============================================================ -->

<!-- VT323 pixel font -->
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap">

<!-- SVG filter definitions.                                              -->
<!-- Must NOT be display:none — browsers refuse to resolve url(#id)       -->
<!-- references into a display:none element. Zero-size keeps it invisible. -->
<svg id="crt-filters-svg" aria-hidden="true" focusable="false"
     style="position:absolute;width:0;height:0;overflow:hidden">

  <!-- Film-grain noise (seed animated by JS) -->
  <filter id="crt-noise-filter" color-interpolation-filters="linearRGB"
          x="0%" y="0%" width="100%" height="100%">
    <feTurbulence id="crt-turbulence"
      type="fractalNoise" baseFrequency="0.75"
      numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>

</svg>

<!-- Noise overlay -->
<svg id="crt-noise-svg" aria-hidden="true" focusable="false"
     style="position:fixed;inset:0;width:100%;height:100%;
            pointer-events:none;z-index:8999;opacity:0.08;mix-blend-mode:screen;">
  <rect width="100%" height="100%" filter="url(#crt-noise-filter)"/>
</svg>

<style id="crt-styles">

/* ── CSS variables (mutated by the profile switcher) ────────────────── */
:root {
  --crt-bg:        #0d0800;
  --crt-glow:      rgba(255, 152, 0, 0.40);
  --crt-filter:    sepia(1) saturate(5) hue-rotate(5deg) brightness(1.15) contrast(1.08);
  --crt-scanlines: 0.13;
}

/* ── Base background ────────────────────────────────────────────────── */
html, body { background: var(--crt-bg) !important; }

/* ── Phosphor tint ──────────────────────────────────────────────────── */
.xterm {
  filter: var(--crt-filter) !important;
}

/* ── Rounded bezel ──────────────────────────────────────────────────── */
#terminal-container {
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0, 0, 0, 0.95);
}

/* ── Bloom ──────────────────────────────────────────────────────────── */
/* Wrapper holds mix-blend-mode; inner canvas holds the tint filter.     */
/* They must be on separate elements: filter creates an isolated          */
/* stacking context that breaks mix-blend-mode if on the same element.   */
#crt-bloom {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 8998;
  mix-blend-mode: screen;
  opacity: 0.5;
  transition: opacity 0.3s;
}
#crt-bloom-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  filter: sepia(1) saturate(5) hue-rotate(5deg);
}

/* ── Scanline overlay ───────────────────────────────────────────────── */
#crt-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9000;
  border-radius: 10px;
}
#crt-overlay::before {   /* scanlines */
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent                          0px,
    transparent                          2px,
    rgba(0,0,0,var(--crt-scanlines))     2px,
    rgba(0,0,0,var(--crt-scanlines))     4px
  );
}

/* ── Horizontal jitter ───────────────────────────────────────────────── */
@keyframes crt-jitter {
  0%,100% { transform: translateX(0);    }
  15%     { transform: translateX(-1px); }
  30%     { transform: translateX( 1px); }
  45%     { transform: translateX(-1px); }
  60%     { transform: translateX( 1px); }
  75%     { transform: translateX(0);    }
}
#terminal-container.crt-jitter {
  animation: crt-jitter 0.12s linear;
}

/* ── Glow line ──────────────────────────────────────────────────────── */
@keyframes crt-glow-line {
  0%   { transform: translateY(-220px); }
  100% { transform: translateY(100vh); }
}
#crt-glow-line {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 220px;
  pointer-events: none;
  z-index: 9001;
  mix-blend-mode: screen;
  background: linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0)      0%,
    rgba(255, 255, 255, 0.01)  45%,
    rgba(255, 255, 255, 0.03)  72%,
    rgba(255, 255, 255, 0.06)  86%,
    rgba(255, 255, 255, 0.10)  95%,
    rgba(255, 255, 255, 0.03)  98%,
    rgba(255, 255, 255, 0)    100%
  );
  animation: crt-glow-line 8s linear infinite;
  transition: opacity 0.3s;
}

/* ── Screen flicker ─────────────────────────────────────────────────── */
@keyframes crt-flicker {
  0%,92%,100% { opacity: 1;    }
  93%         { opacity: 0.96; }
  94%         { opacity: 1;    }
  95%         { opacity: 0.92; }
  96%         { opacity: 0.98; }
  97%         { opacity: 1;    }
  98%         { opacity: 0.94; }
  99%         { opacity: 1;    }
}

/* ── Power-on horizontal sweep ──────────────────────────────────────── */
@keyframes crt-poweron {
  0%   { clip-path: inset(49.6% 0 49.6% 0); filter: brightness(4);   }
  25%  { clip-path: inset(20%   0 20%   0); filter: brightness(3);   }
  65%  { clip-path: inset(0%    0 0%    0); filter: brightness(1.4); }
  100% { clip-path: inset(0%    0 0%    0); }
}
body { animation: crt-flicker 10s steps(1) infinite; }
body.crt-boot {
  animation:
    crt-poweron 0.7s cubic-bezier(.4,0,.2,1) forwards,
    crt-flicker 10s 0.7s steps(1) infinite;
}

/* ── Settings menu ──────────────────────────────────────────────────── */
#crt-menu {
  position: fixed;
  bottom: 10px;
  right: 12px;
  z-index: 9200;
  font-family: 'VT323', monospace;
  font-size: 15px;
  letter-spacing: 1px;
  user-select: none;
}
#crt-menu-btn {
  display: block;
  margin-left: auto;
  padding: 3px 9px;
  background: rgba(0, 0, 0, 0.55);
  color: rgba(255, 165, 0, 0.80);
  border: 1px solid rgba(255, 165, 0, 0.30);
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  letter-spacing: inherit;
  transition: opacity 0.2s;
  opacity: 0.6;
}
#crt-menu-btn:hover { opacity: 1; }
#crt-menu-panel {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  min-width: 170px;
  background: rgba(0, 0, 0, 0.88);
  border: 1px solid rgba(255, 165, 0, 0.30);
  border-radius: 3px;
  padding: 8px 10px;
}
#crt-menu-panel.open { display: block; }
.crt-menu-section {
  color: rgba(255, 165, 0, 0.45);
  font-size: 12px;
  letter-spacing: 2px;
  margin: 8px 0 3px;
  padding-bottom: 2px;
  border-bottom: 1px solid rgba(255, 165, 0, 0.15);
}
.crt-menu-section:first-child { margin-top: 0; }
.crt-menu-profile {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  color: rgba(255, 165, 0, 0.90);
  padding: 2px 0;
}
.crt-menu-profile button {
  background: none;
  border: none;
  color: rgba(255, 165, 0, 0.60);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 0 2px;
  line-height: 1;
}
.crt-menu-profile button:hover { color: rgba(255, 165, 0, 1); }
#crt-profile-label { flex: 1; text-align: center; }
.crt-menu-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: rgba(255, 165, 0, 0.80);
  padding: 2px 0;
  cursor: pointer;
}
.crt-menu-toggle:hover { color: rgba(255, 165, 0, 1); }
.crt-toggle-state { font-size: 13px; }
.crt-toggle-state.on  { color: rgba(255, 165, 0, 0.85); }
.crt-toggle-state.off { color: rgba(255, 165, 0, 0.30); }

</style>

<script id="crt-script">
/* Patch WebGL context creation so bloom can read back pixels.            */
/* Must run before xterm.js creates its renderer — inline scripts execute */
/* synchronously as the parser reaches them, before DOMContentLoaded.     */
(function () {
  var _orig = HTMLCanvasElement.prototype.getContext;
  HTMLCanvasElement.prototype.getContext = function (type, attrs) {
    if (type === 'webgl' || type === 'webgl2') {
      attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
    }
    return _orig.call(this, type, attrs);
  };
}());

(function () {
  'use strict';

  /* ── VT323 font ────────────────────────────────────────────────────── */
  window.tty_options = Object.assign(window.tty_options || {}, {
    fontFamily: "'VT323', 'Courier New', monospace",
    fontSize:   18,
  });

  /* ── Static overlays ───────────────────────────────────────────────── */
  var overlay = document.createElement('div');
  overlay.id = 'crt-overlay';
  document.body.appendChild(overlay);

  var glowLine = document.createElement('div');
  glowLine.id = 'crt-glow-line';
  document.body.appendChild(glowLine);

  /* ── Phosphor profiles ─────────────────────────────────────────────── */
  var profiles = [
    { name: 'AMBER', bg: '#0d0800', glow: 'rgba(255,152,0,0.40)',
      filter: 'sepia(1) saturate(5) hue-rotate(5deg) brightness(1.15) contrast(1.08)',
      bloom:  'sepia(1) saturate(5) hue-rotate(5deg)' },
    { name: 'GREEN', bg: '#00100a', glow: 'rgba(0,255,80,0.35)',
      filter: 'sepia(1) saturate(8) hue-rotate(80deg) brightness(1.10) contrast(1.10)',
      bloom:  'sepia(1) saturate(8) hue-rotate(80deg)' },
    { name: 'WHITE', bg: '#0a0a0d', glow: 'rgba(180,200,255,0.30)',
      filter: 'brightness(1.10) contrast(1.15) saturate(0.20)',
      bloom:  'saturate(0.20)' },
    { name: 'APPLE', bg: '#001400', glow: 'rgba(0,255,100,0.40)',
      filter: 'sepia(1) saturate(10) hue-rotate(95deg) brightness(1.20) contrast(1.05)',
      bloom:  'sepia(1) saturate(10) hue-rotate(95deg)' },
  ];
  var profileIdx = 0;

  function applyProfile(p) {
    var s = document.documentElement.style;
    s.setProperty('--crt-bg',     p.bg);
    s.setProperty('--crt-glow',   p.glow);
    s.setProperty('--crt-filter', p.filter);
    document.body.style.background = p.bg;
    var bc = document.getElementById('crt-bloom-canvas');
    if (bc) bc.style.filter = p.bloom;
    var lbl = document.getElementById('crt-profile-label');
    if (lbl) lbl.textContent = p.name;
  }

  /* ── Effect toggle registry ────────────────────────────────────────── */
  var jitterEnabled = true;

  var effectDefs = [
    {
      id: 'bloom', label: 'BLOOM',
      enable:  function () {
        var el = document.getElementById('crt-bloom');
        if (el) el.style.opacity = '0.5';
      },
      disable: function () {
        var el = document.getElementById('crt-bloom');
        if (el) el.style.opacity = '0';
      },
    },
    {
      id: 'glowline', label: 'GLOW LINE',
      enable:  function () {
        var el = document.getElementById('crt-glow-line');
        if (el) el.style.opacity = '1';
      },
      disable: function () {
        var el = document.getElementById('crt-glow-line');
        if (el) el.style.opacity = '0';
      },
    },
    {
      id: 'scanlines', label: 'SCANLINES',
      enable:  function () { document.documentElement.style.setProperty('--crt-scanlines', '0.13'); },
      disable: function () { document.documentElement.style.setProperty('--crt-scanlines', '0'); },
    },
    {
      id: 'noise', label: 'FILM GRAIN',
      enable:  function () {
        var el = document.getElementById('crt-noise-svg');
        if (el) el.style.opacity = '0.08';
      },
      disable: function () {
        var el = document.getElementById('crt-noise-svg');
        if (el) el.style.opacity = '0';
      },
    },
    {
      id: 'jitter', label: 'JITTER',
      enable:  function () { jitterEnabled = true; },
      disable: function () { jitterEnabled = false; },
    },
    {
      id: 'flicker', label: 'FLICKERING',
      enable:  function () { document.body.style.animationPlayState = 'running'; },
      disable: function () { document.body.style.animationPlayState = 'paused';  },
    },
  ];

  /* Track on/off state */
  var effectState = {};
  effectDefs.forEach(function (e) { effectState[e.id] = true; });

  /* ── Settings menu ─────────────────────────────────────────────────── */
  var menu = document.createElement('div');
  menu.id = 'crt-menu';

  var panel = document.createElement('div');
  panel.id = 'crt-menu-panel';

  /* — Profile row — */
  var profSection = document.createElement('div');
  profSection.className = 'crt-menu-section';
  profSection.textContent = 'PROFILE';
  panel.appendChild(profSection);

  var profRow = document.createElement('div');
  profRow.className = 'crt-menu-profile';

  var prevBtn = document.createElement('button');
  prevBtn.textContent = '◄';
  prevBtn.addEventListener('click', function () {
    profileIdx = (profileIdx - 1 + profiles.length) % profiles.length;
    applyProfile(profiles[profileIdx]);
  });

  var profLabel = document.createElement('span');
  profLabel.id = 'crt-profile-label';
  profLabel.textContent = profiles[profileIdx].name;

  var nextBtn = document.createElement('button');
  nextBtn.textContent = '►';
  nextBtn.addEventListener('click', function () {
    profileIdx = (profileIdx + 1) % profiles.length;
    applyProfile(profiles[profileIdx]);
  });

  profRow.appendChild(prevBtn);
  profRow.appendChild(profLabel);
  profRow.appendChild(nextBtn);
  panel.appendChild(profRow);

  /* — Effect toggles — */
  var fxSection = document.createElement('div');
  fxSection.className = 'crt-menu-section';
  fxSection.textContent = 'EFFECTS';
  panel.appendChild(fxSection);

  effectDefs.forEach(function (def) {
    var row = document.createElement('div');
    row.className = 'crt-menu-toggle';

    var lbl = document.createElement('span');
    lbl.textContent = def.label;

    var state = document.createElement('span');
    state.className = 'crt-toggle-state on';
    state.textContent = 'ON';

    row.appendChild(lbl);
    row.appendChild(state);
    row.addEventListener('click', function () {
      effectState[def.id] = !effectState[def.id];
      if (effectState[def.id]) {
        def.enable();
        state.textContent = 'ON';
        state.className = 'crt-toggle-state on';
      } else {
        def.disable();
        state.textContent = 'OFF';
        state.className = 'crt-toggle-state off';
      }
    });
    panel.appendChild(row);
  });

  /* — Toggle button — */
  var menuBtn = document.createElement('button');
  menuBtn.id = 'crt-menu-btn';
  menuBtn.textContent = '[ CRT ]';
  menuBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    panel.classList.toggle('open');
  });
  document.addEventListener('click', function () {
    panel.classList.remove('open');
  });
  panel.addEventListener('click', function (e) { e.stopPropagation(); });

  menu.appendChild(panel);
  menu.appendChild(menuBtn);
  document.body.appendChild(menu);

  /* ── Animated film-grain noise ─────────────────────────────────────── */
  var turbulence = document.getElementById('crt-turbulence');
  var noiseSeed  = 0;
  (function tickNoise() {
    noiseSeed = (noiseSeed + 1) & 0x3FF;
    turbulence.setAttribute('seed', noiseSeed);
    setTimeout(function () { requestAnimationFrame(tickNoise); }, 80);
  }());

  /* ── Horizontal jitter ─────────────────────────────────────────────── */
  function scheduleJitter() {
    setTimeout(function () {
      if (jitterEnabled) {
        var tc = document.getElementById('terminal-container');
        if (tc) {
          tc.classList.remove('crt-jitter');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              tc.classList.add('crt-jitter');
              setTimeout(function () { tc.classList.remove('crt-jitter'); }, 120);
            });
          });
        }
      }
      scheduleJitter();
    }, 4000 + Math.random() * 14000);
  }
  scheduleJitter();

  /* ── Bloom ─────────────────────────────────────────────────────────── */
  function setupBloom() {
    var screen = document.querySelector('.xterm-screen');
    if (!screen) { setTimeout(setupBloom, 200); return; }

    var bloomWrap    = document.createElement('div');
    bloomWrap.id     = 'crt-bloom';
    var bloomCanvas  = document.createElement('canvas');
    bloomCanvas.id   = 'crt-bloom-canvas';
    bloomWrap.appendChild(bloomCanvas);
    document.body.appendChild(bloomWrap);
    var bloomCtx     = bloomCanvas.getContext('2d');

    var tmp    = document.createElement('canvas');
    var tmpCtx = tmp.getContext('2d');

    var SCALE = 0.25;

    function resize() {
      var w = Math.max(1, Math.round(screen.offsetWidth  * SCALE));
      var h = Math.max(1, Math.round(screen.offsetHeight * SCALE));
      tmp.width  = bloomCanvas.width  = w;
      tmp.height = bloomCanvas.height = h;
      var r = screen.getBoundingClientRect();
      bloomCanvas.style.left   = r.left   + 'px';
      bloomCanvas.style.top    = r.top    + 'px';
      bloomCanvas.style.width  = r.width  + 'px';
      bloomCanvas.style.height = r.height + 'px';
    }
    resize();
    new ResizeObserver(resize).observe(screen);
    window.addEventListener('resize', resize);

    var lastFrame = 0;
    function tick(ts) {
      requestAnimationFrame(tick);
      if (ts - lastFrame < 50) return;
      lastFrame = ts;

      var w = tmp.width, h = tmp.height;
      if (!w || !h) return;

      tmpCtx.clearRect(0, 0, w, h);
      screen.querySelectorAll('canvas').forEach(function (c) {
        if (c === bloomCanvas) return;
        try { tmpCtx.drawImage(c, 0, 0, w, h); } catch (e) {}
      });

      bloomCtx.clearRect(0, 0, w, h);
      bloomCtx.filter = 'blur(2px)';
      bloomCtx.drawImage(tmp, 0, 0);
      bloomCtx.filter = 'none';
    }
    requestAnimationFrame(tick);
  }
  setupBloom();

  /* ── Power-on sweep ────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {
    document.body.classList.add('crt-boot');
  });

}());
</script>
