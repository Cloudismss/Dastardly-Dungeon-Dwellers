<!-- 
  ==========================================================================
  CRT visual effects inspired by github.com/Swordfish90/cool-retro-term
  This file is auto-injected before ttyd's </body> by the .prod Dockerfile. 
  ==========================================================================
-->

<!-- VT323 pixel font -->
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap">

<!--
  SVG filter definitions.
  Must NOT be display:none — browsers refuse to resolve url(#id)
  references into a display:none element. Zero-size keeps it invisible.
-->
<svg id="crt-filters-svg" aria-hidden="true" focusable="false"
     style="position:absolute;width:0;height:0;overflow:hidden">

  <filter id="crt-noise-filter" color-interpolation-filters="linearRGB"
          x="0%" y="0%" width="100%" height="100%">
    <feTurbulence id="crt-turbulence"
      type="fractalNoise" baseFrequency="0.75"
      numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>

  <!--
    Bezel clip: full-viewport rect minus a rounded-rect hole (evenodd).
    JS updates the path whenever frame size or radius changes.
  -->
  <clipPath id="bezel-clip" clipPathUnits="userSpaceOnUse">
    <path id="bezel-clip-path" clip-rule="evenodd"/>
  </clipPath>

  <!--
    Screen curvature displacement filter.
    feImage is populated with a canvas-rendered barrel-distortion map by JS.
    feDisplacementMap remaps source pixels to simulate a convex CRT glass
    surface — replicating the distortCoordinates() formula from cool-retro-term's
    terminal_static.frag shader: cc * (1 + dist) * dist, where dist = dot(cc,cc) * k.
  -->
  <!--
    primitiveUnits="objectBoundingBox" makes all primitive coordinates fractional
    (0=left/top, 1=right/bottom of the filtered element). feImage width/height "1"
    stretches the 128×128 canvas to fill the element regardless of its pixel size
    or the display's devicePixelRatio. feDisplacementMap scale="0.5" means the
    full R/G channel range encodes ±0.5 of the element's bbox dimensions; since
    the channels encode UV-space displacements (not pixels), this correctly handles
    any aspect ratio — scale×W gives x displacement and scale×H gives y displacement.
  -->
  <filter id="crt-curve-filter" color-interpolation-filters="sRGB"
          x="0%" y="0%" width="100%" height="100%"
          primitiveUnits="objectBoundingBox">
    <feImage id="crt-curve-img" x="0" y="0" width="1" height="1"
             preserveAspectRatio="none" result="curvemap"/>
    <feDisplacementMap in="SourceGraphic" in2="curvemap"
                       scale="0.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

</svg>

<!-- Noise overlay -->
<svg id="crt-noise-svg" aria-hidden="true" focusable="false"
     style="position:fixed;inset:0;width:100%;height:100%;
            pointer-events:none;z-index:9101;mix-blend-mode:screen;">
  <rect width="100%" height="100%" filter="url(#crt-noise-filter)"/>
</svg>

<style id="crt-styles">

/* ── CSS variables ─────────────────────────────────────────────────────────── */
/* Initial "safe" defaults; script overrides these immediately based on CONFIG. */
:root {
  --crt-bg:           #000;
  --crt-glow:         transparent;
  --crt-glow-rgb:     0,0,0;
  --crt-filter:       none;
  --crt-scanlines:    0;
  --crt-flicker-amt:  0;
  --crt-jitter-px:    0;
  --crt-frame-px:     0;
  --crt-margin-px:    0;
  --crt-radius-px:    10px;
  --crt-curve-filter: none;
}

/* ── Base background ────────────────────────────────────────────────── */
/* xterm-viewport is the scrollable container behind the WebGL canvas.   */
/* Forcing its background here makes the phosphor ambient colour appear  */
/* immediately on paint, before window.term is available to set the      */
/* xterm theme — so the boot animation already shows the right colour.   */
html, body { 
  background: var(--crt-bg) !important;
  width: 100vw !important;
  height: 100vh !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
}
.xterm-viewport { background-color: var(--crt-bg) !important; }

/* ── Custom scrollbar styling ────────────────────────────────────────── */
/* Standard properties for Firefox */
* {
  scrollbar-width: thin;
  scrollbar-color: rgba(var(--crt-glow-rgb), 0.4) rgba(0, 0, 0, 0.3);
}

/* WebKit/Blink properties (Chrome, Safari, Edge) */
::-webkit-scrollbar {
  width: 8px !important;
  height: 8px !important;
}
::-webkit-scrollbar-track {
  background: rgba(0, 0, 0, 0.3) !important;
}
::-webkit-scrollbar-thumb {
  background: rgba(var(--crt-glow-rgb), 0.3) !important;
  border-radius: 4px !important;
  border: 2px solid var(--crt-bg) !important;
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(var(--crt-glow-rgb), 0.6) !important;
}

/* ── Phosphor tint ──────────────────────────────────────────────────── */
.xterm { filter: var(--crt-filter) !important; }

/* ── Rounded bezel ──────────────────────────────────────────────────── */
#terminal-container {
  /* inset drives the margin: shrinks the container from all four viewport
     edges so the terminal content sits inside the bezel frame. */
  position: fixed !important;
  inset: var(--crt-margin-px) !important;
  width: auto !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
  box-sizing: border-box !important;
  display: block !important;
  border-radius: var(--crt-radius-px);
  overflow: hidden !important;
  box-shadow:
    inset 0 0 15px rgba(0,0,0,0.85),
    0 0 80px rgba(0,0,0,0.95);
  z-index: 1;
  transform: translate(var(--crt-jitter-x, 0), var(--crt-jitter-y, 0));
  /* Screen curvature: driven by --crt-curve-filter (none or url(#crt-curve-filter)). */
  /* The SVG feDisplacementMap remaps terminal pixels to simulate CRT glass curvature. */
  filter: var(--crt-curve-filter);
}

/* ── Bloom ──────────────────────────────────────────────────────────── */
#crt-bloom {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9100;
  mix-blend-mode: screen;
  /* Opacity driven by CSS var so no inline style is set on this element.  */
  /* Adblockers match div[id^="crt-"][style]; keeping style attr absent    */
  /* prevents false-positive hiding.                                       */
  opacity: var(--crt-bloom-opacity, 0);
  transition: opacity 0.2s;
}
#crt-bloom-canvas {
  position: absolute;
  inset: 0;
  /* blur(40px) spreads the thresholded text mask into wide, soft halos.   */
  /* No post-blur brightness step — that causes a ring artifact by         */
  /* amplifying the steep part of the Gaussian falloff more than the tail. */
  filter: blur(40px);
}

/* ── Scanlines ──────────────────────────────────────────────────────── */
#crt-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9102;
  border-radius: 10px;
}
#crt-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent                          0px,
    transparent                          2px,
    rgba(0,0,0,var(--crt-scanlines))     2px,
    rgba(0,0,0,var(--crt-scanlines))     4px
  );
}

/* ── Bezel ──────────────────────────────────────────────────────────── */
/* Full-viewport solid fill, clipped by an evenodd SVG path that cuts a  */
/* rounded-rect hole for the terminal area. Outer corners are square     */
/* (viewport boundary); inner corners are rounded (the SVG path).        */
#crt-bezel {
  position: fixed !important;
  inset: 0 !important;
  background: #1a1a1a;
  pointer-events: none;
  z-index: 9110;
  clip-path: url(#bezel-clip);
}

/* ── Glow line ──────────────────────────────────────────────────────── */
@keyframes crt-glow-line {
  0%   { transform: translateY(-220px); }
  100% { transform: translateY(100vh);  }
}
#crt-glow-line {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 220px;
  pointer-events: none;
  z-index: 9103;
  mix-blend-mode: screen;
  /* Opacity driven by CSS var so no inline style is set on this element.  */
  /* Adblockers match div[id^="crt-"][style]; keeping style attr absent    */
  /* prevents false-positive hiding.                                       */
  background: linear-gradient(
    to bottom,
    rgba(var(--crt-glow-rgb), 0)     0%,
    rgba(var(--crt-glow-rgb), 0.02) 45%,
    rgba(var(--crt-glow-rgb), 0.06) 72%,
    rgba(var(--crt-glow-rgb), 0.12) 86%,
    rgba(var(--crt-glow-rgb), 0.25) 95%,
    rgba(var(--crt-glow-rgb), 0.06) 98%,
    rgba(var(--crt-glow-rgb), 0)   100%
  );
  animation: crt-glow-line 8s linear infinite;
  transition: opacity 0.2s;
  opacity: var(--crt-glow-opacity, 0);
}

/* ── Flicker ────────────────────────────────────────────────────────── */
/* --crt-flicker-amt drives all dip depths so the slider controls them   */
/* proportionally without rewriting keyframe values.                     */
@keyframes crt-flicker {
  0%,92%,100% { opacity: 1; }
  93%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.50); }
  94%  { opacity: 1; }
  95%  { opacity: calc(1 - var(--crt-flicker-amt)); }
  96%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.25); }
  97%  { opacity: 1; }
  98%  { opacity: calc(1 - var(--crt-flicker-amt) * 0.75); }
  99%  { opacity: 1; }
}

/* ── Power-on sweep ─────────────────────────────────────────────────── */
@keyframes crt-poweron {
  0%   { clip-path: inset(49.6% 0 49.6% 0); filter: brightness(4);   }
  25%  { clip-path: inset(20%   0 20%   0); filter: brightness(3);   }
  65%  { clip-path: inset(0%    0 0%    0); filter: brightness(1.4); }
  100% { clip-path: inset(0%    0 0%    0); }
}
#terminal-container { animation: crt-flicker 10s steps(1) infinite; }
#terminal-container.crt-boot {
  animation:
    crt-poweron 0.7s cubic-bezier(.4,0,.2,1) forwards,
    crt-flicker 10s 0.7s steps(1) infinite;
}

/* ── Settings menu ──────────────────────────────────────────────────── */
#crt-menu {
  position: fixed;
  bottom: 10px;
  right: 12px;
  z-index: 9200;
  font-family: 'VT323', monospace;
  font-size: 15px;
  letter-spacing: 1px;
  user-select: none;
}
#crt-menu-btn {
  display: block;
  margin-left: auto;
  padding: 3px 9px;
  background: rgba(0,0,0,0.55);
  color: rgba(var(--crt-menu-rgb),0.80);
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  letter-spacing: inherit;
  transition: opacity 0.2s;
  opacity: 0.6;
}
#crt-menu-btn:hover { opacity: 1; }
#crt-menu-panel {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  min-width: 210px;
  background: rgba(0,0,0,0.90);
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  border-radius: 3px;
  padding: 8px 10px 10px;
}
#crt-menu-panel.open { display: block; }

.crt-menu-section {
  color: rgba(var(--crt-menu-rgb),0.45);
  font-size: 12px;
  letter-spacing: 2px;
  margin: 8px 0 4px;
  padding-bottom: 2px;
  border-bottom: 1px solid rgba(var(--crt-menu-rgb),0.15);
}
.crt-menu-section:first-child { margin-top: 0; }

/* Profile row */
.crt-menu-profile {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  color: rgba(var(--crt-menu-rgb),0.90);
  padding: 2px 0;
}
.crt-menu-profile button {
  background: none;
  border: none;
  color: rgba(var(--crt-menu-rgb),1);
  opacity: 0.6;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 0 2px;
  line-height: 1;
  transition: opacity 0.1s;
}
.crt-menu-profile button:hover { opacity: 1; }
#crt-profile-label { flex: 1; text-align: center; }

/* Effect rows */
.crt-effect-row { margin: 5px 0 2px; }
.crt-effect-header {
  display: flex;
  align-items: baseline;
  gap: 5px;
  color: rgba(var(--crt-menu-rgb),0.80);
}
.crt-effect-header.dim { color: rgba(var(--crt-menu-rgb),0.30); }
.crt-effect-label { flex: 1; }
.crt-effect-value { font-size: 13px; min-width: 26px; text-align: right; }
.crt-effect-toggle {
  background: none;
  border: 1px solid rgba(var(--crt-menu-rgb),0.30);
  color: rgba(var(--crt-menu-rgb),0.70);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 0;
  padding: 0 4px;
  border-radius: 2px;
  line-height: 1.4;
}
.crt-effect-toggle:hover { color: rgba(var(--crt-menu-rgb),1); border-color: rgba(var(--crt-menu-rgb),0.60); }
.crt-effect-toggle.off   { color: rgba(var(--crt-menu-rgb),0.30); border-color: rgba(var(--crt-menu-rgb),0.15); }

/* Range slider */
.crt-slider {
  -webkit-appearance: none;
  appearance: none;
  display: block;
  width: 100%;
  height: 2px;
  background: rgba(var(--crt-menu-rgb),0.20);
  outline: none;
  border: none;
  cursor: pointer;
  margin: 3px 0 0;
  padding: 0;
}
.crt-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 8px;
  height: 14px;
  background: rgba(var(--crt-menu-rgb),0.85);
  border-radius: 1px;
  cursor: pointer;
}
.crt-slider::-moz-range-thumb {
  width: 8px;
  height: 14px;
  background: rgba(var(--crt-menu-rgb),0.85);
  border-radius: 1px;
  border: none;
  cursor: pointer;
}
.crt-slider:disabled {
  opacity: 0.25;
  cursor: default;
}

/* ── Custom profile checkbox ─────────────────────────────────────────── */
#crt-prof-section { display: flex; align-items: center; justify-content: space-between; }
#crt-custom-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 1px;
}
#crt-custom-cb { cursor: pointer; margin: 0; width: 11px; height: 11px; }

/* ── Custom color picker ─────────────────────────────────────────────── */
#crt-color-picker {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 5px 0 3px;
}
#crt-color-picker.visible { display: flex; }
#crt-hue-wheel { cursor: crosshair; display: block; }

</style>
